# @package _global_
defaults:
  - /post_training_compression
  - _self_

checkpoint_path: ???
checkpoint_name: last.ckpt
output_directory: null
device: cpu
calibration_steps: 16
preparation:
  replace_frozen_batchnorm: true
  fuse_conv_batchnorm: true
pruning:
  - _target_: versatil.post_training_compression.pruning.UnstructuredPruner
    amount: 0.2
quantization: null

modules:
  - module_path: encoding_pipeline
    quantization: null

  - module_path: decoder
    quantization:
      _target_: versatil.quantization.strategies.PT2EStrategy
      pt2e_backend:
        _target_: versatil.quantization.backends.x86_inductor.X86InductorBackend
        is_dynamic: false
