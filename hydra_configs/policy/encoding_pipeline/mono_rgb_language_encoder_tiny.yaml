defaults:
  - encoder/image/spatial@encoders.left
  - encoder/language@encoders.instruction
  - _self_

  
encoders:
  left:
    input_keys:
    - ${cameras:LEFT}
    backbone: ${rgb_backbone:MOBILENETV4_SMALL_050}
    pretrained: true
    frozen: false
    pooling_method: none
    batch_norm_handling: ${batch_norm_handling:FROZEN}
  instruction:
    model_name: ${language_model:MINI_LM_L6}
    pretrained: true
    frozen: true
    max_token_len: ${task.dataloader.tokenization.observation_tokenizer.max_token_len}
    use_embeddings_only: true

fusion_stages: []
