defaults:
  - encoder/vlm/paligemma@encoders.vlm
  - _self_

encoders:
  vlm:
    input_keys:
      - ${cameras:AGENTVIEW}
      - ${cameras:EYE_IN_HAND}
      - ${sample_key:TOKENIZED_OBSERVATIONS}
    model_name: ${paligemma_model:PALIGEMMA2_3B_224}
    pretrained: true
    frozen: true
    use_embeddings_only: false
    max_text_length: ${task.dataloader.tokenization.observation_tokenizer.max_token_len}

fusion_stages: []