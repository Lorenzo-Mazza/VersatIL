defaults:
  - encoder/image/spatial@encoders.left
  - encoder/image/spatial@encoders.right
  - _self_
  
encoders:
  left:
    input_keys:
    - ${cameras:LEFT}
    backbone: ${rgb_backbone:EFFICIENTNET_B0}
    pretrained: true
    frozen: false
    pooling_method: none
    batch_norm_handling: ${batch_norm_handling:FROZEN}

  right:
    input_keys:
    - ${cameras:RIGHT}
    backbone: ${rgb_backbone:EFFICIENTNET_B0}
    pretrained: true
    frozen: false
    pooling_method: none
    batch_norm_handling: ${batch_norm_handling:FROZEN}

