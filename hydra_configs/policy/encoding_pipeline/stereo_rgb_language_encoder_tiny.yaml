defaults:
  - encoder/image/cnn@encoders.left
  - encoder/image/cnn@encoders.right
  - encoder/language@encoders.instruction
  - _self_

_target_: versatil.models.encoding.pipeline.EncodingPipeline

encoders:
  left:
    _target_: versatil.models.encoding.encoders.rgb.cnn.CNNEncoder
    input_keys:
    - ${cameras:LEFT}
    backbone: ${rgb_backbone:MOBILENETV4_SMALL_050}
    pretrained: true
    frozen: false
    pooling_method: none
    batch_norm_handling: ${batch_norm_handling:FROZEN}

  right:
    _target_: versatil.models.encoding.encoders.rgb.cnn.CNNEncoder
    input_keys:
    - ${cameras:RIGHT}
    backbone: ${rgb_backbone:MOBILENETV4_SMALL_050}
    pretrained: true
    frozen: false
    pooling_method: none
    batch_norm_handling: ${batch_norm_handling:FROZEN}

  instruction:
    model_name: ${language_model:ALBERT_BASE}
    pretrained: true
    frozen: true
    max_token_len: ${task.dataloader.tokenization.observation_tokenizer.max_token_len}
    pooling_method: none
    use_embeddings_only: true

fusion_stages: []