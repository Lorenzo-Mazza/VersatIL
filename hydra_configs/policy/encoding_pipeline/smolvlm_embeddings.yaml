defaults:
  - encoder/vlm/smolvlm@encoders.vlm
  - encoder/proprio@encoders.robot_state
  - _self_

_target_: versatil.models.encoding.pipeline.EncodingPipeline
observation_space: ${task.observation_space}

encoders:
  vlm:
    input_keys:
      - ${cameras:AGENTVIEW}
      - ${cameras:EYE_IN_HAND}
      - ${sample_key:TOKENIZED_OBSERVATIONS}
    model_name: HuggingFaceTB/SmolVLM2-500M-Instruct
    pretrained: true
    frozen: true
    use_embeddings_only: true
    max_text_length: ${task.dataloader.tokenization.observation_tokenizer.max_token_len}

  robot_state:
    input_keys:
      - ${proprio_key:EE_POS}
      - ${proprio_key:EE_ORI}
      - ${proprio_key:GRIPPER_STATE}
    output_dim: 960
    pretrained: false
    frozen: false

fusion_stages: []
