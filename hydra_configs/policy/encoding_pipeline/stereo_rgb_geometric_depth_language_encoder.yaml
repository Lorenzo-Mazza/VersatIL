defaults:
  - encoder/geometric_rgbd@encoders.left_depth
  - encoder/image/spatial@encoders.right
  - encoder/language@encoders.instruction
  - _self_
  
encoders:
  left_depth:
    input_keys:
      - ${cameras:LEFT}
      - ${cameras:DEPTH}
    embedding_dimension: 512
    patch_size: 32
    pooling_method: none

  right:
    input_keys:
     - ${cameras:RIGHT}
    backbone: ${rgb_backbone:RESNET18}
    pretrained: true
    frozen: false
    pooling_method: none
    batch_norm_handling: ${batch_norm_handling:FROZEN}

  instruction:
    model_name: ${language_model:BERT_BASE}
    pretrained: true
    frozen: true
    max_token_len: ${task.dataloader.tokenization.observation_tokenizer.max_token_len}

fusion_stages: []
