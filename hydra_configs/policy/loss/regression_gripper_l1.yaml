defaults:
  - regression@loss_modules.regression_loss
  - regression@loss_modules.gripper_loss
  - traj_len@loss_modules.trajectory_length
  - _self_

loss_modules:
    regression_loss:
      action_keys:
        - ${proprio_key:CAMERA_FRAME_CARTESIAN_TIP_POS}
      mse_weight: 0.0
      l1_weight: 1.0

    gripper_loss:
      action_keys:
        - ${proprio_key:GRIPPER_STATE}
      mse_weight: 0.0
      l1_weight: 0.05

    trajectory_length:
        weight: 0.000
        action_key: ${proprio_key:CAMERA_FRAME_CARTESIAN_TIP_POS}
