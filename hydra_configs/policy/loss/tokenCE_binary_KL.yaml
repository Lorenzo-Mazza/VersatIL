defaults:
  - token_loss@loss_modules.token_loss
  - binary_kl@loss_modules.binary_kl
  - _self_

_target_: versatil.metrics.composite.CompositeLoss
loss_modules:
    token_loss:
      label_smoothing: 0.1

    binary_kl:
      free_bits: 1.3  # 2 * math.log(2) ≈1.386 nats
      latent_bits: ${policy.decoder.latent_bits}
      # Preserves pre-refactor behavior:
      # BinaryKLDivergenceLossConfig default weight 0.0001 * old composite multiplier 5.0.
      weight: 0.0005
      entropy_weight: 0.0001
