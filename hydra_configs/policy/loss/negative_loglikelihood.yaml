defaults:
  - gaussian_mixture_nll@loss_modules.moe_loss.base_loss.loss_modules.action_nll
  - gripper_mixture_nll@loss_modules.moe_loss.base_loss.loss_modules.gripper_nll
  - traj_len@loss_modules.moe_loss.base_loss.loss_modules.trajectory_length
  - _self_

_target_: versatil.metrics.CompositeLoss
loss_modules:
  moe_loss:
    _target_: versatil.metrics.MoELoss
    base_loss:
      _target_: versatil.metrics.CompositeLoss
      loss_modules:
        action_nll:
          action_keys:
            - ${proprio_key:CAMERA_FRAME_CARTESIAN_TIP_POS}
          weight: 1.0
          learned_variance: true

        gripper_nll:
          key: ${proprio_key:GRIPPER_STATE}
          actions_metadata: ${task.action_space.actions_metadata}
          learned_variance: true
          weight: 0.05

        trajectory_length:
          weight: 0.0
          action_key: ${proprio_key:CAMERA_FRAME_CARTESIAN_TIP_POS}