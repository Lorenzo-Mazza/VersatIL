defaults:
  - regression@loss_modules.regression_loss
  - gripper@loss_modules.gripper_loss
  - traj_len@loss_modules.trajectory_length
  - _self_

_target_: versatil.metrics.composite.CompositeLoss
loss_modules:
    regression_loss:
      _target_: versatil.metrics.components.RegressionLoss
      action_keys:
        - ${proprio_key:CAMERA_FRAME_CARTESIAN_TIP_POS}
      mse_weight: 0.0
      l1_weight: 1.0
      huber_weight: 0.0

    gripper_loss:
      _target_: versatil.metrics.components.GripperLoss
      key: ${proprio_key:GRIPPER_STATE}
      actions_metadata: ${task.action_space.actions_metadata}
      bce_weight: 0.05

    trajectory_length:
        _target_: versatil.metrics.components.TrajectoryLengthLoss
        weight: 0.000
        action_key: ${proprio_key:CAMERA_FRAME_CARTESIAN_TIP_POS}
