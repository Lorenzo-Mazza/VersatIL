defaults:
  - pi0
  - heads@action_heads: libero_vla

input_keys:
  - vlm_fused_rgb_language

observation_horizon: ${task.observation_horizon}
prediction_horizon: ${task.prediction_horizon}
action_space: ${task.action_space}
observation_space: ${task.observation_space}
device: ${experiment.device}

expert_hidden_size: 1024
expert_intermediate_size: 4096
expert_number_of_heads: 8
expert_number_of_key_value_heads: 1
expert_number_of_layers: 18
expert_head_dimension: 256
time_conditioning: ${time_conditioning:CONCAT_MLP}
min_period: 0.004
max_period: 4.0
proprioceptive_feature_key: null
normalization_type: ${normalization:RMS_NORM}
dropout: 0.0
