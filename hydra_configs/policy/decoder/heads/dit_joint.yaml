defaults:
  - /policy/decoder/action_head@joint_action: conditional
  - _self_

joint_action:
  input_dim: ${policy.decoder.embedding_dimension}
  condition_dim: ${policy.decoder.embedding_dimension}
  blocks:
    - _target_: versatil.models.decoding.action_heads.blocks.AdaNormBlock
      input_dim: ${...input_dim}
      condition_dim: ${...condition_dim}
      activation: ${activation_function:SILU}
