defaults:
  - moe_free_transformer
  - heads@action_heads: tokenized_moe

# Input features from encoding pipeline
input_keys:
  - left_rgb
  - right_rgb
  - instruction_language

embedding_dimension: 256
number_of_heads: 8
number_of_key_value_heads: 2
feedforward_dimension: 1024
number_of_encoder_layers: 1  # Encoder for latent prediction (training only)
number_of_decoder_layers: 4  # Must be even (split at midpoint for latent injection)
latent_bits: 6  # Number of bits for latent codes (2^16 = 65536 codes)
max_seq_len: 1024

activation: ${activation_function:SWIGLU}
normalization_type: ${normalization:RMS_NORM}
attention_type: ${attention:GROUPED_QUERY}
dropout_rate: 0.2
attention_dropout: 0.1
positional_encoding_type: ${pos_encoding:ROPE}
temperature: 10.0
learnable_temperature: true
deterministic: true

observation_horizon: ${task.observation_horizon}
prediction_horizon: ${task.prediction_horizon}
action_space: ${task.action_space}
observation_space: ${task.observation_space}
device: ${experiment.device}