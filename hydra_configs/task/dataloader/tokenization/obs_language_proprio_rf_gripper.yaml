defaults:
  - base

tokenize_observations: true
tokenize_actions: false
observation_tokenizer:
  tokenizer_model: ${language_model:BERT_BASE}
  observation_keys:
    - ${proprio_key:ROBOT_FRAME_CARTESIAN_TIP_POS}
    - ${proprio_key:GRIPPER_STATE}
    - ${obs_key:LANGUAGE}
  max_token_len: 64
  bin_continuous_data: true
