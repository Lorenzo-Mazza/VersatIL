defaults:
  - base

_target_: versatil.data.task.ObservationSpace

observations_metadata:
  ${cameras:AGENTVIEW}:
    _target_: versatil.data.metadata.RGBCameraMetadata
    camera_key: ${raw_camera:FRONT}
    dtype: uint8
    image_width: 256
    image_height: 256

  ${cameras:EYE_IN_HAND}:
    _target_: versatil.data.metadata.RGBCameraMetadata
    camera_key: ${raw_camera:WRIST}
    dtype: uint8
    image_width: 256
    image_height: 256

  ${obs_key:LANGUAGE}:
    _target_: versatil.data.metadata.ObservationMetadata
    raw_data_column_keys: [task]
    dtype: str
    dimension: 1
    is_numerical: false
    needs_normalization: false