# @package _global_
# Sweep: LACT + DiT flow prior, weight=0.1, 10 inference steps.
# 5 tasks × 3 seeds = 15 runs.
# min_logvar=null (no variance floor on posterior).

defaults:
  - /end_to_end_training_runs/synthetic/lact_dit_prior
  - /task_bundle/synthetic: circle
  - override /hydra/sweeper: basic
  - _self_

policy:
  loss:
    loss_modules:
      denoising_prior:
        weight: 0.1
  algorithm:
    posterior_encoder:
      min_logvar: null
    prior:
      num_inference_steps: 10

hydra:
  sweeper:
    params:
      task_bundle/synthetic: circle,sequential,corridor_k8,corridor_k16,radial_k16
      experiment.seed: 42,43,44
