# @package _global_
# Sweep: LACT variational Gaussian prior with Sinkhorn OT objective.
# 5 tasks × 2 weights × 3 seeds = 30 runs.
# Deterministic WAE recipe: match posterior mu to Gaussian samples, and train
# the decoder on a jittered tube around posterior mu.

defaults:
  - /end_to_end_training_runs/synthetic/lact_ot_gaussian
  - /task_bundle/synthetic: circle
  - override /hydra/sweeper: basic
  - _self_

policy:
  algorithm:
    posterior_decoder_noise_std: 0.135
    posterior_encoder:
      latent_dimension: 2
      deterministic: true
    prior:
      latent_dimension: 2
  loss:
    loss_modules:
      latent_ot:
        prior_target_key: ${latent_key:POSTERIOR_MU}
        blur_fraction: 0.1
        reach_multiplier: null

task:
  dataloader:
    val_ratio: 0.05

hydra:
  sweeper:
    params:
      task_bundle/synthetic: circle,sequential,corridor_k8,corridor_k16,radial_k16
      policy.loss.loss_modules.latent_ot.weight: 0.01,0.1
      experiment.seed: 42,43,44
