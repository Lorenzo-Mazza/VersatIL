# @package _global_
# Sweep: LACT variational Gaussian prior with KL objective.
# 6 tasks × 5 KL weights = 30 runs.
#
# Usage:
#   python -m versatil.endpoints.train --multirun \
#     --config-name sweeps/synthetic/lact_kl_gaussian

defaults:
  - /end_to_end_training_runs/synthetic/lact_kl_gaussian
  - /task_bundle/synthetic: circle
  - override /hydra/sweeper: basic
  - _self_

hydra:
  sweeper:
    params:
      task_bundle/synthetic: circle,conditional_circle,sequential,radial_k8,radial_k16,corridor_k8
      policy.loss.loss_modules.kl_divergence.weight: 0.001,0.01,0.1,1,100
