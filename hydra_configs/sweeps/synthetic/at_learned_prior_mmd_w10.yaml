# @package _global_
# Stage 2: AT with learned Gaussian prior + MMD.
# 5 tasks × 2 weights × 3 seeds = 30 runs.
# WAE recipe: IMQ kernel, use_median_heuristic=false, bandwidth=2*latent_dim.
# Reuses the fixed-Gaussian e2e and swaps the algorithm to bc_with_learned_prior.

defaults:
  - /end_to_end_training_runs/synthetic/action_transformer_mmd_gaussian
  - /task_bundle/synthetic: circle
  - override /policy/algorithm: bc_with_learned_prior
  - override /hydra/sweeper: basic
  - _self_

policy:
  loss:
    loss_modules:
      maximum_mean_discrepancy:
        kernel_type: ${kernel_type:IMQ}
        use_median_heuristic: false
        bandwidth_multipliers:
          - ${mul:2,${policy.algorithm.posterior_encoder.latent_dimension}}

hydra:
  sweeper:
    params:
      task_bundle/synthetic: circle,sequential,corridor_k8,corridor_k16,radial_k16
      policy.loss.loss_modules.maximum_mean_discrepancy.weight: 1,10
      experiment.seed: 42,43,44
