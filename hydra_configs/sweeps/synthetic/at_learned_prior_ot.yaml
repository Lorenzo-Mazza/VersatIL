# @package _global_
# Stage 2: AT with learned Gaussian prior + OT (blur=0.5, reach=1.0, weight=1.0).
# 6 tasks × 1 = 6 runs.

defaults:
  - /end_to_end_training_runs/synthetic/action_transformer_ot_gaussian
  - /task_bundle/synthetic: circle
  - override /policy/algorithm: bc_with_learned_prior
  - override /hydra/sweeper: basic
  - _self_

policy:
  loss:
    loss_modules:
      latent_ot:
        blur_fraction: 0.5
        reach_multiplier: 1.0
        weight: 1.0

hydra:
  sweeper:
    params:
      task_bundle/synthetic: circle,conditional_circle,sequential,radial_k8,radial_k16,corridor_k8
