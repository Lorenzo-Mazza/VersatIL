# @package _global_
# Sweep: sequential-only LACT + DiT flow prior diagnostic.
# Grid: 2 posterior modes x 3 prior weights x 3 seeds = 18 runs.
# Stochastic posterior uses min_logvar=-4; deterministic posterior ignores logvar.

defaults:
  - /end_to_end_training_runs/synthetic/lact_dit_prior
  - /task_bundle/synthetic: sequential
  - override /hydra/sweeper: basic
  - _self_

task:
  dataloader:
    val_ratio: 0.05
training:
  num_epochs: 2000

policy:
  loss:
    loss_modules:
      denoising_prior:
        weight: 0.1
  algorithm:
    posterior_encoder:
      latent_dimension: 4
      mu_tanh_bound: 4.0
      min_logvar: -4.0
      deterministic: false
      embedding_dimension: 32
      number_of_heads: 4
      feedforward_dimension: 128
      number_of_encoder_layers: 4
      activation: ${activation_function:RELU}

    prior:
      latent_dimension: 4
      num_inference_steps: 10
      embedding_dimension: 32
      number_of_heads: 4
      feedforward_dimension: 128
      activation: ${activation_function:RELU}

hydra:
  sweeper:
    params:
      policy.loss.loss_modules.denoising_prior.weight: 0.03,5, 0.1, 1.0
      policy.algorithm.posterior_encoder.deterministic: true,false
      #experiment.seed: 42,43,44
