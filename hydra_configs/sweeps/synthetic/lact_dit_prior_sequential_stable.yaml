# @package _global_
# Sequential-only LACT + DiT prior stability test.
# Hypothesis: deterministic/thin posterior support is not learnable by a full-dimensional
# flow prior. Use stochastic z with a nontrivial variance floor plus aggregate MMD to
# keep q(z) near N(0,I), while training the DiT prior only with denoising loss.

defaults:
  - /end_to_end_training_runs/synthetic/lact_dit_prior
  - /task_bundle/synthetic: sequential
  - override /policy/loss: regression_MMD_denoising_prior
  - override /hydra/sweeper: basic
  - _self_

task:
  dataloader:
    val_ratio: 0.05

training:
  num_epochs: 2000
  early_stopping_patience: 20
  reduce_lr_on_plateau: false
  reduce_lr_patience: 3
  reduce_lr_cooldown: 2
  optimizer:
    lr: 2.0e-4
    weight_decay: 2.0e-2
    param_groups:
      - name: backbone
        lr: 1.0e-5
        weight_decay: 1.0e-3
        params_pattern: "^encoding_pipeline\\.encoders\\.[^.]+\\.backbone\\."
      - name: posterior
        lr: 5.0e-5
        params_pattern: "^algorithm\\.posterior_encoder\\."
      - name: prior
        lr: 5.0e-4
        params_pattern: "^algorithm\\.prior\\."
      - name: decoder
        lr: 1.0e-4
        params_pattern: "^decoder\\."

policy:
  algorithm:
    sampling_from_prior_probability: 0.0
    posterior_encoder:
      latent_dimension: 4
      mu_tanh_bound: 4.0
      min_logvar: -2.0
      deterministic: false
      embedding_dimension: 32
      number_of_heads: 4
      feedforward_dimension: 128
      number_of_encoder_layers: 4
      activation: ${activation_function:RELU}

    prior:
      latent_dimension: 4
      num_inference_steps: 10
      embedding_dimension: 32
      number_of_heads: 4
      feedforward_dimension: 128
      activation: ${activation_function:RELU}

  loss:
    loss_modules:
      denoising_prior:
        weight: 0.1
      maximum_mean_discrepancy:
        weight: 10.0

hydra:
  sweeper:
    params:
      policy.loss.loss_modules.maximum_mean_discrepancy.weight: 3.0,10.0
      policy.loss.loss_modules.denoising_prior.weight: 0.1,0.3
      policy.algorithm.posterior_encoder.min_logvar: -3.0,-2.0
