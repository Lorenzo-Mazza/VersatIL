# @package _global_
# Sweep: LACT variational Gaussian prior with MMD objective.
# 6 tasks × 5 weights × 2 kernels × 2 median-heuristic = 120 runs.

defaults:
  - /end_to_end_training_runs/synthetic/lact_mmd_gaussian
  - /task_bundle/synthetic: circle
  - override /hydra/sweeper: basic
  - _self_

hydra:
  sweeper:
    params:
      task_bundle/synthetic: circle,conditional_circle,sequential,radial_k8,radial_k16,corridor_k8
      policy.loss.loss_modules.maximum_mean_discrepancy.weight: 0.001,0.01,1,100,1000
      policy.loss.loss_modules.maximum_mean_discrepancy.kernel_type: rbf,imq
      policy.loss.loss_modules.maximum_mean_discrepancy.use_median_heuristic: true,false
