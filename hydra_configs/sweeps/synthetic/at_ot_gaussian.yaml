# @package _global_
# Sweep: AT variational Gaussian prior with Sinkhorn OT objective.
# 5 tasks × 2 weights × 3 seeds = 30 runs.
# blur=0.1, reach=null, min_logvar=null (no variance floor).

defaults:
  - /end_to_end_training_runs/synthetic/action_transformer_ot_gaussian
  - /task_bundle/synthetic: circle
  - override /hydra/sweeper: basic
  - _self_

policy:
  loss:
    loss_modules:
      latent_ot:
        blur_fraction: 0.1
        reach_multiplier: null
  algorithm:
    posterior_encoder:
      min_logvar: null

hydra:
  sweeper:
    params:
      task_bundle/synthetic: circle,sequential,corridor_k8,corridor_k16,radial_k16
      policy.loss.loss_modules.latent_ot.weight: 0.01,0.1
      experiment.seed: 42,43,44
