# @package _global_
# Sweep: AT variational Gaussian prior with Sinkhorn OT objective.
# 6 tasks × 3 blur × 3 weight × 3 reach = 162 runs.

defaults:
  - /end_to_end_training_runs/synthetic/action_transformer_ot_gaussian
  - /task_bundle/synthetic: circle
  - override /hydra/sweeper: basic
  - _self_

hydra:
  sweeper:
    params:
      task_bundle/synthetic: circle,conditional_circle,sequential,radial_k8,radial_k16,corridor_k8
      policy.loss.loss_modules.latent_ot.blur_fraction: 0.1,0.3,0.5
      policy.loss.loss_modules.latent_ot.weight: 0.01,0.1,1
      policy.loss.loss_modules.latent_ot.reach_multiplier: null,1,10
