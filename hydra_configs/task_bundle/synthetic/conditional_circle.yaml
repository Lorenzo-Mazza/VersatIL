# @package _global_
# Task bundle: synthetic conditional_circle, K=2 modes with context observation.
defaults:
  - override /task/dataset_schema: synthetic/conditional_circle
  - override /task/observation_space: synthetic_image_state_context
  - override /policy/encoding_pipeline: mono_rgb_context

policy:
  metadata_passthrough:
    ${metadata_passthrough_source:OBSERVATION}:
      ${synthetic_obs_key:MODE_ID}: ${metadata_key:LATENT_COLOR_LABEL}
  algorithm:
    posterior_encoder:
      latent_dimension: 1
    prior:
      latent_dimension: 1
