# @package _global_
# Task bundle: synthetic circle, K=2 modes.
# Packages dataset schema, observation space, encoding pipeline, latent
# dimension, and epoch budget. Consumed by sweep YAMLs that vary this bundle.
defaults:
  - override /task/dataset_schema: synthetic/circle
  - override /task/observation_space: synthetic_image_state
  - override /policy/encoding_pipeline: mono_rgb

policy:
  algorithm:
    posterior_encoder:
      latent_dimension: 1
    prior:
      latent_dimension: 1
