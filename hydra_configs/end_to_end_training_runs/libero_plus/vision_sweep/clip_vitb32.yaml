# @package _global_
_target_: versatil.configs.main.MainConfig

defaults:
  - /task: base
  - /policy: base
  - /experiment: default
  - /task/dataset_schema: libero_plus_lerobot
  - /task/dataloader: libero_lerobot
  - /task/action_space: libero_precomputed_lerobot
  - /task/observation_space: libero_plus_rgb_lerobot
  - /training: default
  - /policy/encoding_pipeline: mono_vlm
  - /policy/decoder: action_transformer_language
  - /policy/algorithm: behavioral_cloning
  - /policy/loss: regression_gripper
  - /inference: default
  - override /policy/decoder/heads@policy.decoder.action_heads: libero
  - _self_

task:
  observation_horizon: 1
  prediction_horizon: 10
  dataloader:
    tokenization:
      observation_tokenizer:
        tokenizer_model: ${vlm_model:CLIP_VITB32}

experiment:
  precision: ${precision:FP32}
  checkpoint_folder: ${checkpoint_dir:libero}
  checkpoint_every: 5

training:
  num_epochs: 40
  early_stopping_patience: 100
  lr_schedule: null
  clip_gradient_norm: true
  clip_max_norm: 1.0

policy:
  _target_: versatil.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  observation_horizon: ${task.observation_horizon}
  device: ${experiment.device}
  validate_loss_keys: true
  loss:
    loss_modules:
      regression_loss:
        action_keys:
          - ${proprio_key:EE_POS_ACTION}
          - ${proprio_key:EE_ORI_ACTION}
      gripper_loss:
        key: ${proprio_key:GRIPPER_STATE_ACTION}
      trajectory_length:
        action_key: ${proprio_key:EE_POS_ACTION}
  encoding_pipeline:
    encoders:
      left:
        input_keys:
          - ${cameras:AGENTVIEW}
          - ${cameras:EYE_IN_HAND}
          - ${sample_key:TOKENIZED_OBSERVATIONS}
        model_name: ${vlm_model:CLIP_VITB32}
        pooling_method: none
  decoder:
    input_keys:
      - 'left_rgb:agentview_rgb'
      - 'left_rgb:eye_in_hand_rgb'
      - left_language
