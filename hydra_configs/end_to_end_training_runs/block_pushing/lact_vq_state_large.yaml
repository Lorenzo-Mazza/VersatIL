# @package _global_
# BlockPush state-only LACT VQ with the large PushT capacity.
_target_: versatil.configs.main.MainConfig

defaults:
  - /task: base
  - /policy: base
  - /experiment: default
  - /task/dataset_schema: block_pushing
  - /task/dataloader: block_pushing_state
  - /task/action_space: block_pushing_precomputed
  - /task/observation_space: block_pushing_state
  - /training: default
  - /policy/encoding_pipeline: block_pushing_state
  - /policy/decoder: lact
  - /policy/algorithm: bc_with_vq_uniform
  - /policy/loss: regression_vq
  - /inference: default
  - override /policy/decoder/heads@policy.decoder.action_heads: block_pushing_2d
  - _self_

task:
  observation_horizon: 1
  prediction_horizon: 10
  dataloader:
    val_ratio: 0.0
    preload_data_in_memory: true

experiment:
  name: end_to_end_training_runs/block_pushing/robot_sweep/lact_vq_state_large
  checkpoint_folder: ${checkpoint_dir:block_pushing}
  checkpoint_every: 100
  save_checkpoints: true
  use_wandb: true

training:
  num_epochs: 1200
  early_stopping_patience: null
  clip_gradient_norm: false
  lr_schedule: null
  use_ema: true
  optimizer:
    lr: 5.0e-4
    param_groups: []
  stages: []

policy:
  _target_: versatil.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  observation_horizon: ${task.observation_horizon}
  device: ${experiment.device}
  validate_loss_keys: true

  loss:
    loss_modules:
      regression_loss:
        action_keys:
          - ${proprio_key:EE_POS_ACTION}
        mse_weight: 0.0
        l1_weight: 1.0
        huber_weight: 0.0
      vq_commitment:
        weight: 0.25
        num_codes: ${policy.algorithm.posterior_encoder.num_codes}
        num_residual_layers: ${policy.algorithm.posterior_encoder.num_residual_layers}
      trajectory_length:
        weight: 0.0
        action_key: ${proprio_key:EE_POS_ACTION}

  decoder:
    input_keys:
      - robot_state_proprio
    latent_dimension: ${policy.algorithm.posterior_encoder.latent_dimension}
    embedding_dimension: 256
    number_of_heads: 8
    feedforward_dimension: 1024
    number_of_layers: 4
    dropout_rate: 0.1
    attention_dropout: 0.01

  algorithm:
    sampling_from_prior_probability: 0.0
    posterior_decoder_noise_std: 0.0
    posterior_encoder:
      latent_dimension: 16
      num_codes: 8
      num_residual_layers: 2
      embedding_dimension: 256
      number_of_heads: 8
      feedforward_dimension: 1024
      number_of_encoder_layers: 4
      dropout_rate: 0.1
      attention_dropout: 0.01
      device: ${policy.device}
    prior:
      latent_dimension: 16
      num_codes: 8
      num_residual_layers: 2
      device: ${policy.device}
