# @package _global_
_target_: versatil.configs.main.MainConfig

defaults:
  - /task: base
  - /policy: base
  - /experiment: default
  - /task/dataset_schema: bowel_retraction_v2
  - /task/dataloader: bowel_retraction_minmax_spatial_aug
  - /task/action_space: deltas_cf_pos_gripper
  - /task/observation_space: stereo_rgb_proprio_cf
  - /training: ema_cosine_schedule
  - /policy/encoding_pipeline: stereo_rgb_pooled_proprioceptive_camera_frame
  - /policy/decoder: conditional_unet
  - /policy/algorithm: flow_matching
  - /policy/loss: regressionMSE_gripper
  - /inference: default
  - _self_

experiment:
  checkpoint_folder: ${checkpoint_dir:bowel_retraction}

task:
  observation_horizon: 2
  prediction_horizon: 16

policy:
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  observation_horizon: ${task.observation_horizon}
  device: ${experiment.device}
  validate_loss_keys: true
