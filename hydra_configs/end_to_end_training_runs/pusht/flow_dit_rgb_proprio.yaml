# @package _global_
# Flow Matching with DiT Cross-Attention Transformer - RGB + ee_pos proprio
# Follows DiffusionPolicy-T hyperparameters from Chi et al. 2023 for Push-T image
_target_: versatil.configs.main.MainConfig

defaults:
  - /task: base
  - /policy: base
  - /experiment: default
  - /task/dataset_schema: pusht
  - /task/dataloader: pusht_rgb
  - /task/action_space: pusht_precomputed
  - /task/observation_space: pusht_rgb_proprio
  - /training: default
  - /policy/encoding_pipeline: pusht_rgb_proprio
  - /policy/decoder: dit_multimodal
  - /policy/algorithm: flow_matching
  - /policy/loss: regression_synthetic
  - /inference: default
  - override /policy/decoder/heads@policy.decoder.action_heads: pusht_2d
  - _self_

task:
  observation_horizon: 1
  prediction_horizon: 10
  dataloader:
    val_ratio: 0.0
    preload_data_in_memory: true

experiment:
  checkpoint_folder: ${checkpoint_dir:pusht}
  checkpoint_every: 5

training:
  num_epochs: 50
  early_stopping_patience: null

policy:
  _target_: versatil.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  observation_horizon: ${task.observation_horizon}
  device: ${experiment.device}
  validate_loss_keys: true
  loss:
    loss_modules:
      regression_loss:
        action_keys:
          - ${proprio_key:EE_POS_ACTION}
        mse_weight: 1.0
        l1_weight: 0.0
        huber_weight: 0.0
      trajectory_length:
        weight: 0.0
        action_key: ${proprio_key:EE_POS_ACTION}
  encoding_pipeline:
    encoders:
      left:
        input_keys:
          - ${cameras:AGENTVIEW}
  decoder:
    input_keys:
      - left_rgb
      - robot_state_proprio
    embedding_dimension: 256
    timestep_embedding_dimension: 128
    number_of_heads: 8
    number_of_layers: 4
    feedforward_dimension: 1024
    dropout_rate: 0.1
    attention_dropout: 0.01
