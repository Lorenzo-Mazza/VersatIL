# @package _global_
# LACT with a DiT flow prior trained from Gaussian source noise and no dropout.
_target_: versatil.configs.main.MainConfig

defaults:
  - /task: base
  - /policy: base
  - /experiment: synthetic
  - /task/dataset_schema: synthetic/circle
  - /task/dataloader: synthetic_default
  - /task/action_space: synthetic_2d
  - /task/observation_space: synthetic_image_state
  - /training: synthetic
  - /policy/encoding_pipeline: mono_rgb
  - /policy/decoder: lact
  - /policy/algorithm: bc_with_dit_prior
  - /policy/loss: regression_denoising_prior
  - /inference: default
  - override /policy/decoder/heads@policy.decoder.action_heads: synthetic_2d
  - _self_

task:
  observation_horizon: 1
  prediction_horizon: 60
  dataloader:
    val_ratio: 0.05

experiment:
  checkpoint_folder: ${checkpoint_dir:synthetic}

policy:
  metadata_passthrough:
    ${metadata_passthrough_source:OBSERVATION}:
      ${synthetic_obs_key:MODE_ID}: ${metadata_key:LATENT_COLOR_LABEL}
  _target_: versatil.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  observation_horizon: ${task.observation_horizon}
  device: ${experiment.device}
  validate_loss_keys: true

  encoding_pipeline:
    encoders:
      left:
        input_keys:
          - ${cameras:AGENTVIEW}
        backbone: ${rgb_backbone:MOBILENETV4_SMALL_050}

  decoder:
    input_keys:
      - left_rgb
    embedding_dimension: 256
    number_of_heads: 8
    feedforward_dimension: 512
    number_of_layers: 4
    dropout_rate: 0.0
    attention_dropout: 0.0

  algorithm:
    sampling_from_prior_probability: 0.0
    posterior_decoder_noise_std: 0.0
    posterior_encoder:
      latent_dimension: 1
      embedding_dimension: 256
      number_of_heads: 8
      feedforward_dimension: 512
      number_of_encoder_layers: 4
      dropout_rate: 0.0
      attention_dropout: 0.0
      min_logvar: -4.0
      device: ${policy.device}
    prior:
      latent_dimension: 1
      embedding_dimension: 256
      number_of_heads: 8
      number_of_layers: 4
      feedforward_dimension: 512
      dropout: 0.0
      use_gating: true
      algorithm_type: ${denoising_algorithm:FLOW_MATCHING}
      prior_target_key: ${latent_key:POSTERIOR_MU}
      sigma: 0.0
      ode_solver: euler
      timestep_sampler: ${timestep_sampler:BETA}
      beta_alpha: 1.5
      beta_beta: 1.0
      max_timestep: 0.999
      num_inference_steps: 10
      latent_standardization_enabled: false
      require_fitted_latent_standardization: false

  loss:
    loss_modules:
      denoising_prior:
        weight: 0.01
