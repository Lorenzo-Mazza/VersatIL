# @package _global_
# Kitchen RGB-only LACT with a learned DiT prior and large capacity.
_target_: versatil.configs.main.MainConfig

defaults:
  - /task: base
  - /policy: base
  - /experiment: default
  - /task/dataset_schema: kitchen
  - /task/dataloader: kitchen_rgb
  - /task/action_space: kitchen_precomputed
  - /task/observation_space: kitchen_rgb
  - /training: default
  - /policy/encoding_pipeline: kitchen_rgb
  - /policy/decoder: lact
  - /policy/algorithm: bc_with_dit_prior
  - /policy/loss: regression_denoising_prior
  - /inference: default
  - override /policy/decoder/heads@policy.decoder.action_heads: kitchen_9d
  - _self_

task:
  observation_horizon: 1
  prediction_horizon: 10
  dataloader:
    val_ratio: 0.0
    preload_data_in_memory: true

experiment:
  name: end_to_end_training_runs/kitchen/lat_flow_rgb
  checkpoint_folder: ${checkpoint_dir:kitchen}
  checkpoint_every: 100
  save_checkpoints: true
  use_wandb: true

training:
  num_epochs: 1000
  early_stopping_patience: null
  clip_gradient_norm: false
  lr_schedule: null
  use_ema: true
  optimizer:
    lr: 5.0e-4
    param_groups:
      - name: backbone
        lr: 1.0e-5
        weight_decay: 1.0e-3
        params_pattern: encoding_pipeline.encoders.*.backbone
  stages: []

policy:
  _target_: versatil.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  observation_horizon: ${task.observation_horizon}
  device: ${experiment.device}
  validate_loss_keys: true

  loss:
    loss_modules:
      regression_loss:
        action_keys:
          - ${proprio_key:KITCHEN_ARM_ACTION}
        mse_weight: 0.0
        l1_weight: 1.0
        huber_weight: 0.0
      denoising_prior:
        weight: 0.01
      trajectory_length:
        weight: 0.0
        action_key: ${proprio_key:KITCHEN_ARM_ACTION}
      posterior_geometry:
        _target_: versatil.metrics.components.PosteriorGeometryLoss
        key: ${latent_key:POSTERIOR_MU}
        mean_weight: 0.01
        std_weight: 0.05
        target_std: 1.0
        max_std_weight: 0.1
        max_std: 2.0
        covariance_weight: 0.01

  encoding_pipeline:
    encoders:
      left:
        input_keys:
          - ${cameras:AGENTVIEW}

  decoder:
    input_keys:
      - left_rgb
    latent_dimension: ${policy.algorithm.posterior_encoder.latent_dimension}
    embedding_dimension: 256
    number_of_heads: 8
    feedforward_dimension: 1024
    number_of_layers: 4
    dropout_rate: 0.1
    attention_dropout: 0.01

  algorithm:
    sampling_from_prior_probability: 0.0
    posterior_decoder_noise_std: 0.075
    posterior_encoder:
      latent_dimension: 16
      embedding_dimension: 256
      number_of_heads: 8
      feedforward_dimension: 1024
      number_of_encoder_layers: 4
      dropout_rate: 0.1
      attention_dropout: 0.01
      min_logvar: null
      deterministic: true
      mu_tanh_bound: null
      device: ${policy.device}
    prior:
      latent_dimension: 16
      embedding_dimension: 256
      number_of_heads: 8
      number_of_layers: 4
      feedforward_dimension: 1024
      algorithm_type: ${denoising_algorithm:FLOW_MATCHING}
      sigma: 0.0
      ode_solver: euler
      timestep_sampler: ${timestep_sampler:BETA}
      beta_alpha: 1.5
      beta_beta: 1.0
      max_timestep: 0.999
      num_inference_steps: 10
      dropout: 0.1
      normalization_type: ${normalization:LAYER_NORM}
      attention_type: ${attention:MULTI_HEAD}
      number_of_key_value_heads: null
      activation: ${activation_function:SILU}
      use_gating: true
      exclude_keys: null
      prior_target_key: ${latent_key:POSTERIOR_MU}
      latent_standardization_enabled: false
      latent_standardization_eps: 1.0e-6
      latent_standardization_max_batches: null
      require_fitted_latent_standardization: false
