# @package training.stages
# Two-stage recipe: train posterior/decoder first, then train the prior only.
- name: vae
  start_epoch: 0
  trainable_groups:
    - posterior
    - decoder
    - unmatched
  frozen_groups:
    - prior
  loss_weights:
    denoising_prior:
      weight: 0.0
  eval_frozen_modules: true
- name: prior
  start_epoch: ${stage_split_epoch:${training.num_epochs},0.4}
  trainable_groups:
    - prior
  frozen_groups:
    - posterior
    - decoder
    - unmatched
  eval_frozen_modules: true
