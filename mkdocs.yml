site_name: VersatIL
site_description: Modular Imitation Learning framework for robotic manipulation
site_url: https://lorenzo-mazza.github.io/VersatIL
repo_url: https://github.com/Lorenzo-Mazza/VersatIL
repo_name: Lorenzo-Mazza/VersatIL

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: media/VersatIL_transparent.png
  favicon: media/VersatIL_transparent.png

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            show_if_no_docstring: false
            signature_crossrefs: true
            separate_signature: true
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - First Training Run: getting-started/training.md
      - Configuration: getting-started/configuration.md
      - Deploying a Policy: getting-started/inference.md
      - Quantization-Aware Training: getting-started/quantization_aware_training.md
      - Compressing a Trained Policy: getting-started/post_training_compression.md
  - Architecture:
      - Overview: architecture/overview.md
      - Encoding Pipeline: architecture/encoding.md
      - Algorithms: architecture/algorithms.md
      - Action Decoders: architecture/decoders.md
      - Data Pipeline: architecture/data.md
      - Inference: architecture/inference.md
      - Explainability: architecture/explainability.md
      - Quantization: architecture/quantization.md
      - Post-Training Compression: architecture/post_training_compression.md
  - Papers Reproducibility Instructions:
      - Overview: papers-reproducibility-instructions/index.md
      - Supervised MoE Surgical Grasping: papers-reproducibility-instructions/supervised-moe-bowel-retraction.md
  - API Reference: reference/
  - Known Issues: known-issues.md
  - Changelog: changelog.md
