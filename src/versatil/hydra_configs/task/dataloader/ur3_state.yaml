defaults:
  - base

# UR3 uses batch_size=2048 and train_ratio=0.95.
# num_workers=0 is fine because preload_data_in_memory already keeps the
# small state+action dataset in RAM. Forking
# workers over preloaded zarr arrays caused `pickle data was truncated`
# + OOM-kill on the spawned forkserver children.
batch_size: 2048
num_workers: 0
shuffle: true
preload_data_in_memory: true

image_norm_type: ${image_norm_type:MINUS_ONE_TO_ONE}
depth_norm_type: ${image_norm_type:MINUS_ONE_TO_ONE}
kinematics_norm_type: ${kinematics_norm_type:MIN_MAX}
winsorize_depth: false
winsorize_kinematics: false


skip_initial_episode_steps: 0
downsample_factor: 1
action_backward_shift: 0

val_ratio: 0.05
total_ratio: 1.0
