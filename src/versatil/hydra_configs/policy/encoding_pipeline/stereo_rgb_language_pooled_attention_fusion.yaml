defaults:
  - encoder/image/spatial@encoders.left
  - encoder/image/spatial@encoders.right
  - encoder/language@encoders.instruction
  - _self_
  
encoders:
  left:
    input_keys:
    - ${cameras:LEFT}
    backbone: ${rgb_backbone:EFFICIENTNET_B0}
    pretrained: true
    frozen: false
    pooling_method: ${pooling_method:SPATIAL_SOFTMAX}
    batch_norm_handling: ${batch_norm_handling:FROZEN}

  right:
    input_keys:
    - ${cameras:RIGHT}
    backbone: ${rgb_backbone:EFFICIENTNET_B0}
    pretrained: true
    frozen: false
    pooling_method: ${pooling_method:SPATIAL_SOFTMAX}
    batch_norm_handling: ${batch_norm_handling:FROZEN}

  instruction:
    model_name: ${language_model:BERT_BASE}
    pretrained: true
    frozen: true
    max_token_len: ${task.dataloader.tokenization.observation_tokenizer.max_token_len}
    pooling_method: ${pooling_method:LEARNED_AGGREGATION}
    use_embeddings_only: false

fusion_stages:
  - _target_: versatil.models.encoding.fusion.attention.AttentionFusion
    input_features:
      - left_rgb
      - right_rgb
    context_features:
      - instruction_language
    output_name: fused_visual
    hidden_dim: 256
    num_heads: 4
