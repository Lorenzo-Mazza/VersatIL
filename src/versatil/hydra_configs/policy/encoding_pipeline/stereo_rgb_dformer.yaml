defaults:
  - encoder/dformer@encoders.dformer
  - encoder/image/spatial@encoders.right
  - _self_

encoders:
  dformer:
    input_keys:
      - ${cameras:LEFT}
      - ${cameras:DEPTH}
    variant: S
    pretrained_weights: ${dformer_weights:NYU}
    pretrained: true
    frozen: true
    pooling_method: none

  right:
    input_keys:
     - ${cameras:RIGHT}
    backbone: ${rgb_backbone:RESNET18}
    pretrained: false
    frozen: false
    pooling_method: none
    batch_norm_handling: ${batch_norm_handling:FROZEN}

fusion_stages:
  - _target_: versatil.models.encoding.fusion.concat.ConcatFusion
    input_features:
      - dformer_rgbd
      - right_rgb
    output_name: visual_features
    hidden_dimension: 256
