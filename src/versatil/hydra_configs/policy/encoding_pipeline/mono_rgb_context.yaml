defaults:
  - encoder/image/spatial@encoders.left
  - encoder/proprio@encoders.context
  - _self_

encoders:
  left:
    input_keys:
      - ${cameras:AGENTVIEW}
    backbone: ${rgb_backbone:EFFICIENTNET_B0}
    pretrained: true
    frozen: false
    pooling_method: none
    batch_norm_handling: ${batch_norm_handling:FROZEN}

  context:
    input_keys:
      - ${synthetic_obs_key:CONTEXT}
    output_dim: 32
    hidden_dims: [32]

fusion_stages: []
