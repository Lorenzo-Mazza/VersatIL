defaults:
  - encoder/image/spatial@encoders.left
  - encoder/image/spatial@encoders.right
  - encoder/proprio@encoders.camera_frame
  - _self_

encoders:
  left:
    input_keys:
      - ${cameras:LEFT}
    backbone: ${rgb_backbone:RESNET18}
    pretrained: true
    frozen: false
    pooling_method: ${pooling_method:SPATIAL_SOFTMAX}
    batch_norm_handling: ${batch_norm_handling:FROZEN}

  right:
    input_keys:
      - ${cameras:RIGHT}
    backbone: ${rgb_backbone:RESNET18}
    pretrained: true
    frozen: false
    pooling_method: ${pooling_method:SPATIAL_SOFTMAX}
    batch_norm_handling: ${batch_norm_handling:FROZEN}

  camera_frame:
    input_keys:
      - ${proprio_key:CAMERA_FRAME_CARTESIAN_TIP_POS}
    output_dim: 32
