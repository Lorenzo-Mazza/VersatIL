${proprio_key:ROBOT_FRAME_CARTESIAN_TIP_POS}:
  _target_: versatil.models.decoding.action_heads.ActionHead
  input_dimension: ${policy.decoder.embedding_dimension}
  blocks:
    - _target_: versatil.models.decoding.action_heads.blocks.MLPBlock
      input_dimension: ${policy.decoder.embedding_dimension}
      hidden_dimensions:
        - 256
        - 128
      output_dim: null
      activation: ${activation_function:SILU}
      dropout: ${policy.decoder.dropout_rate}

${proprio_key:GRIPPER_STATE}:
  _target_: versatil.models.decoding.action_heads.ActionHead
  input_dimension: ${policy.decoder.embedding_dimension}
  blocks:
    - _target_: versatil.models.decoding.action_heads.blocks.MLPBlock
      input_dimension: ${policy.decoder.embedding_dimension}
      hidden_dimensions:
        - 128
      output_dim: null
      activation: ${activation_function:SILU}
      dropout: ${policy.decoder.dropout_rate}
