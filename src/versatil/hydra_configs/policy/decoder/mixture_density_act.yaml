defaults:
  - mode_act
  - heads@action_heads: gaussian_bowel_retraction

input_keys:
  - left_rgb
  - right_rgb
embedding_dimension: 128
number_of_heads: 8
number_of_key_value_heads: 2
feedforward_dimension: 512
number_of_layers: 4
activation: ${activation_function:RELU}
normalization_type: ${normalization:RMS_NORM}
attention_type: ${attention:GROUPED_QUERY}
dropout_rate: 0.1
attention_dropout: 0.05
positional_encoding_type: ${pos_encoding:SINUSOIDAL}
num_mixture_components: 8
gating_hidden_dims:
  - 256
  - 128
  - 64
gating_activation: ${activation_function:SILU}
gating_dropout: 0.1
gating_normalization: true
temperature: 10.0
learnable_temperature: true
gating_feature_key: null