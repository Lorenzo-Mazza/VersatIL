defaults:
  - action_transformer@base_expert

_target_: versatil.models.decoding.decoders.moe.MoEDecoder
gating_feature_key: ${latent_key:POSTERIOR_LATENT}
temperature: 10.0
learnable_temperature: true
routing_type: ${moe_routing_type:SOFT}
num_experts: 16
gating_activation: ${activation_function:SILU}
gating_input_dim: ${policy.algorithm.posterior_encoder.latent_dimension}
gating_hidden_dims:
  - 128
gating_dropout: 0.1
gating_normalization: true
base_expert:
  input_keys:
    - left_rgb
    - right_rgb
  embedding_dimension: 64
  number_of_heads: 8
  number_of_key_value_heads: 2
  feedforward_dimension: 256
  number_of_layers: 2
  activation: ${activation_function:SWIGLU}
  normalization_type: ${normalization:RMS_NORM}
  attention_type: ${attention:GROUPED_QUERY}
  dropout_rate: 0.1
  attention_dropout: 0.05
  positional_encoding_type: ${pos_encoding:ROPE}

  observation_horizon: ${task.observation_horizon}
  prediction_horizon: ${task.prediction_horizon}
  action_space: ${task.action_space}
  observation_space: ${task.observation_space}
  device: ${experiment.device}
  action_heads:
    ${proprio_key:CAMERA_FRAME_CARTESIAN_TIP_POS}:
      _target_: versatil.models.decoding.action_heads.ActionHead
      input_dimension: ${policy.decoder.base_expert.embedding_dimension}
      blocks:
        - _target_: versatil.models.decoding.action_heads.blocks.MLPBlock
          input_dimension: ${policy.decoder.base_expert.embedding_dimension}
          hidden_dimensions:
            - 64
            - 32
          output_dim: null
          activation: ${activation_function:SILU}
          dropout: ${policy.decoder.base_expert.dropout_rate}
    ${proprio_key:GRIPPER_STATE}:
      _target_: versatil.models.decoding.action_heads.ActionHead
      input_dimension: ${policy.decoder.base_expert.embedding_dimension}
      blocks:
        - _target_: versatil.models.decoding.action_heads.blocks.MLPBlock
          input_dimension: ${policy.decoder.base_expert.embedding_dimension}
          hidden_dimensions:
            - 64
            - 32
          output_dim: null
          activation: ${activation_function:SILU}
          dropout: ${policy.decoder.base_expert.dropout_rate}