# @package _global_
# Variational LACT with Sinkhorn OT latent regularization (fixed Gaussian prior).
_target_: versatil.configs.main.MainConfig

defaults:
  - /task: base
  - /policy: base
  - /experiment: synthetic
  - /task/dataset_schema: synthetic/circle
  - /task/dataloader: synthetic_default
  - /task/action_space: synthetic_2d
  - /task/observation_space: synthetic_image_state
  - /training: synthetic
  - /policy/encoding_pipeline: mono_rgb
  - /policy/decoder: lact
  - /policy/algorithm: bc_with_vae_gaussian
  - /policy/loss: regression_OT
  - /inference: default
  - override /policy/decoder/heads@policy.decoder.action_heads: synthetic_2d
  - _self_

task:
  observation_horizon: 1
  prediction_horizon: 60
  dataloader:
    val_ratio: 0.05

experiment:
  checkpoint_folder: ${checkpoint_dir:synthetic}
  save_checkpoints: true

policy:
  metadata_passthrough:
    ${metadata_passthrough_source:OBSERVATION}:
      ${synthetic_obs_key:MODE_ID}: ${metadata_key:LATENT_COLOR_LABEL}
  _target_: versatil.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  observation_horizon: ${task.observation_horizon}
  device: ${experiment.device}
  encoding_pipeline:
    encoders:
      left:
        input_keys:
          - ${cameras:AGENTVIEW}
        backbone: ${rgb_backbone:MOBILENETV4_SMALL_050}
  decoder:
    input_keys:
      - left_rgb
    embedding_dimension: 256
    number_of_heads: 8
    feedforward_dimension: 512
    number_of_layers: 4
    dropout_rate: 0.2
    attention_dropout: 0.05
    activation: ${activation_function:RELU}
  algorithm:
    posterior_decoder_noise_std: 0.075
    posterior_encoder:
      latent_dimension: 2
      embedding_dimension: 256
      number_of_heads: 8
      feedforward_dimension: 512
      number_of_encoder_layers: 4
      dropout_rate: 0.2
      attention_dropout: 0.05
      device: ${policy.device}
      deterministic: true
      mu_tanh_bound: null
      min_logvar: null
      activation: ${activation_function:RELU}
    prior:
      latent_dimension: 2
  loss:
    loss_modules:
      latent_ot:
        weight: 0.01
        prior_target_key: ${latent_key:POSTERIOR_MU}
        blur_fraction: 0.1
        reach_multiplier: null
      posterior_geometry:
        _target_: versatil.metrics.losses.latent_geometry.PosteriorGeometryLoss
        key: ${latent_key:POSTERIOR_MU}
        mean_weight: 0.01
        std_weight: 0.05
        target_std: 1.0
        max_std_weight: 0.1
        max_std: 2.0
        covariance_weight: 0.01
