# @package _global_
# LACT with learned Gaussian prior, conditional MMD, posterior geometry, jitter, and dropout.
_target_: versatil.configs.main.MainConfig

defaults:
  - /task: base
  - /policy: base
  - /experiment: synthetic
  - /task/dataset_schema: synthetic/circle
  - /task/dataloader: synthetic_default
  - /task/action_space: synthetic_2d
  - /task/observation_space: synthetic_image_state
  - /training: synthetic
  - /policy/encoding_pipeline: mono_rgb
  - /policy/decoder: lact
  - /policy/algorithm: bc_with_learned_prior
  - /policy/loss: regression_conditional_MMD
  - /inference: default
  - override /policy/decoder/heads@policy.decoder.action_heads: synthetic_2d
  - _self_

task:
  observation_horizon: 1
  prediction_horizon: 60
  dataloader:
    val_ratio: 0.05

experiment:
  checkpoint_folder: ${checkpoint_dir:synthetic}
  checkpoint_every: 100
  save_checkpoints: true

policy:
  metadata_passthrough:
    ${metadata_passthrough_source:OBSERVATION}:
      ${synthetic_obs_key:MODE_ID}: ${metadata_key:LATENT_COLOR_LABEL}
  _target_: versatil.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  observation_horizon: ${task.observation_horizon}
  device: ${experiment.device}

  encoding_pipeline:
    encoders:
      left:
        input_keys:
          - ${cameras:AGENTVIEW}
        backbone: ${rgb_backbone:MOBILENETV4_SMALL_050}

  decoder:
    input_keys:
      - left_rgb
    latent_dimension: ${policy.algorithm.posterior_encoder.latent_dimension}
    embedding_dimension: 256
    number_of_heads: 8
    feedforward_dimension: 512
    number_of_layers: 4
    dropout_rate: 0.2
    attention_dropout: 0.05
    activation: ${activation_function:RELU}

  algorithm:
    sampling_from_prior_probability: 0.0
    posterior_decoder_noise_std: 0.075
    posterior_encoder:
      latent_dimension: 2
      embedding_dimension: 256
      number_of_heads: 8
      feedforward_dimension: 512
      number_of_encoder_layers: 4
      dropout_rate: 0.2
      attention_dropout: 0.05
      min_logvar: null
      deterministic: true
      device: ${policy.device}
      activation: ${activation_function:RELU}
    prior:
      latent_dimension: 2
      embedding_dimension: 256
      number_of_heads: 8
      feedforward_dimension: 512
      number_of_encoder_layers: 4
      dropout_rate: 0.2
      attention_dropout: 0.05
      min_logvar: null
      device: ${policy.device}
      activation: ${activation_function:RELU}

  loss:
    loss_modules:
      conditional_mmd:
        weight: 1.0
        state_weight: 1.0
        prior_target_key: ${latent_key:POSTERIOR_MU}
        condition_key: ${latent_key:PRIOR_CONDITION}
        kernel_type: ${kernel_type:IMQ}
        use_median_heuristic: false
        bandwidth_multipliers:
          - ${mul:0.5,${mul:2,${policy.algorithm.posterior_encoder.latent_dimension}}}
          - ${mul:1.0,${mul:2,${policy.algorithm.posterior_encoder.latent_dimension}}}
          - ${mul:2.0,${mul:2,${policy.algorithm.posterior_encoder.latent_dimension}}}
          - ${mul:4.0,${mul:2,${policy.algorithm.posterior_encoder.latent_dimension}}}
        condition_kernel_type: ${kernel_type:RBF}
        condition_use_median_heuristic: false
        condition_bandwidth_multipliers:
          - 0.5
          - 1.0
          - 2.0
        normalize_condition: true
      posterior_geometry:
        _target_: versatil.metrics.losses.latent_geometry.PosteriorGeometryLoss
        key: ${latent_key:POSTERIOR_MU}
        mean_weight: 0.01
        std_weight: 0.05
        target_std: 1.0
        max_std_weight: 0.1
        max_std: 2.0
        covariance_weight: 0.01
