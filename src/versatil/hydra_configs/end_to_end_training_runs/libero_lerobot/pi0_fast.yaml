# @package _global_
_target_: versatil.configs.main.MainConfig

defaults:
  - /task: base
  - /policy: base
  - /experiment: default
  - /task/dataset_schema: libero_lerobot
  - /task/dataloader: libero_lerobot
  - /task/action_space: libero_precomputed_lerobot
  - /task/observation_space: libero_rgb_proprio_lerobot
  - /training: default
  - /policy/decoder: pi0_fast
  - /policy/algorithm: behavioral_cloning
  - /policy/loss: token_ce
  - _self_

task:
  observation_horizon: 1
  prediction_horizon: 10
  observation_space:
    observations_metadata:
      ${proprio_key:GRIPPER_STATE}:
        needs_normalization: true
  dataloader:
    batch_size: 2
    image_norm_type: ${image_norm_type:MINUS_ONE_TO_ONE}
    kinematics_norm_type: ${kinematics_norm_type:GAUSSIAN}
    tokenization:
      tokenize_observations: true
      tokenize_actions: true
      observation_tokenizer:
        tokenizer_model: ${paligemma_model:PALIGEMMA2_3B_224}
        observation_keys:
          - ${obs_key:LANGUAGE}
          - ${proprio_key:EE_POS}
          - ${proprio_key:EE_ORI}
          - ${proprio_key:GRIPPER_STATE}
        max_token_len: 96
        padding_strategy: ${token_padding:MAX_LENGTH}
      action_tokenizer:
        action_discretizer:
          type: ${action_discretizer:FAST}
          use_pretrained: false
        token_id_mapping:
          type: ${action_token_id_mapping:LANGUAGE_VOCABULARY}
          language_tokenizer_model: ${paligemma_model:PALIGEMMA2_3B_224}
          num_special_tokens_to_skip: 128
        max_token_len: 128

experiment:
  precision: ${precision:BF16_MIXED}
  checkpoint_folder: ${checkpoint_dir:libero}
  checkpoint_every: 5

training:
  num_epochs: 10
  gradient_accumulate_every: 16
  early_stopping_patience: 10
  clip_gradient_norm: true
  clip_max_norm: 1.0
  lr_schedule: "cosine_with_min_lr"
  lr_warmup_steps: 1000
  lr_scheduler_kwargs:
    min_lr: 2.5e-6
  optimizer:
    lr: 2.5e-5
    betas: [0.9, 0.95]
    weight_decay: 0.01
    param_groups: []

policy:
  _target_: versatil.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  observation_horizon: ${task.observation_horizon}
  device: ${experiment.device}
  encoding_pipeline:
    _target_: versatil.models.encoding.pipeline.EncodingPipeline
    encoders: {}
    observation_space: ${task.observation_space}
    fusion_stages: []
