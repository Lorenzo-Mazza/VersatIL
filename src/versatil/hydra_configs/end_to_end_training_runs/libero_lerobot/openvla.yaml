# @package _global_
_target_: versatil.configs.main.MainConfig

defaults:
  - /task: base
  - /policy: base
  - /experiment: default
  - /task/dataset_schema: libero_lerobot
  - /task/dataloader: libero_lerobot
  - /task/action_space: libero_precomputed_lerobot
  - /task/observation_space: libero_rgb_lerobot
  - /training: default
  - /policy/decoder: openvla
  - /policy/algorithm: behavioral_cloning
  - /policy/loss: tokenCE
  - _self_

task:
  observation_horizon: 1
  prediction_horizon: 1
  dataloader:
    batch_size: 2
    image_norm_type: ${image_norm_type:ZERO_TO_ONE}
    kinematics_norm_type: ${kinematics_norm_type:MIN_MAX}
    tokenization:
      tokenize_observations: true
      tokenize_actions: true
      observation_tokenizer:
        tokenizer_model: ${prismatic_llm_model:LLAMA2_7B_PURE}
        observation_keys:
          - ${obs_key:LANGUAGE}
        max_token_len: 96
        raw_text: true
        prompt_template: "In: What action should the robot take to {instruction}?\nOut: "
        padding_strategy: ${token_padding:MAX_LENGTH}
      action_tokenizer:
        action_discretizer:
          type: ${action_discretizer:BINNED}
          binning_strategy: ${binning_strategy:UNIFORM}
          num_bins: 256
          min_value: -1.0
          max_value: 1.0
        token_id_mapping:
          type: ${action_token_id_mapping:LANGUAGE_VOCABULARY}
          language_tokenizer_model: ${prismatic_llm_model:LLAMA2_7B_PURE}
          num_special_tokens_to_skip: 0
        max_token_len: 8 # 1 action step * 7 action dimensions + EOS

experiment:
  precision: ${precision:BF16_MIXED}
  checkpoint_folder: ${checkpoint_dir:libero}
  checkpoint_every: 5

training:
  num_epochs: 10
  gradient_accumulate_every: 16
  early_stopping_patience: 10
  clip_gradient_norm: true
  clip_max_norm: 1.0
  lr_schedule: "cosine_with_min_lr"
  lr_warmup_steps: 1000
  lr_scheduler_kwargs:
    min_lr: 2.5e-6
  optimizer:
    lr: 2.5e-5
    betas: [0.9, 0.95]
    weight_decay: 0.01
    param_groups: []

policy:
  _target_: versatil.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  observation_horizon: ${task.observation_horizon}
  device: ${experiment.device}
  encoding_pipeline:
    _target_: versatil.models.encoding.pipeline.EncodingPipeline
    encoders: {}
    observation_space: ${task.observation_space}
    fusion_stages: []
  loss:
    loss_modules:
      token_loss:
        label_smoothing: 0.0
  decoder:
    vlm_backbone:
      lora_config:
        rank: 32
        alpha: 16
        dropout: 0.0
        target_modules: ${lora_target_modules:ALL_LINEAR}
        bias: none
        init_lora_weights: gaussian
