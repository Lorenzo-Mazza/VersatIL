# @package _global_
# Kitchen RGB-only LACT fixed-prior VAE-KL with large capacity.
_target_: versatil.configs.main.MainConfig

defaults:
  - /task: base
  - /policy: base
  - /experiment: default
  - /task/dataset_schema: kitchen
  - /task/dataloader: kitchen_rgb
  - /task/action_space: kitchen_precomputed
  - /task/observation_space: kitchen_rgb
  - /training: default
  - /policy/encoding_pipeline: kitchen_rgb
  - /policy/decoder: lact
  - /policy/algorithm: bc_with_vae_gaussian
  - /policy/loss: regression_KL
  - /inference: default
  - override /policy/decoder/heads@policy.decoder.action_heads: kitchen_9d
  - _self_

task:
  observation_horizon: 1
  prediction_horizon: 10
  dataloader:
    val_ratio: 0.05
    preload_data_in_memory: true

experiment:
  checkpoint_folder: ${checkpoint_dir:kitchen}
  checkpoint_every: 100
  save_checkpoints: true
  use_wandb: true

training:
  num_epochs: 1000
  early_stopping_patience: null
  clip_gradient_norm: false
  lr_schedule: null
  use_ema: true
  optimizer:
    lr: 5.0e-4
    param_groups:
      - name: backbone
        lr: 1.0e-5
        weight_decay: 1.0e-3
        params_pattern: encoding_pipeline.encoders.*.backbone
  stages: []

policy:
  _target_: versatil.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  observation_horizon: ${task.observation_horizon}
  device: ${experiment.device}

  loss:
    loss_modules:
      regression_loss:
        action_keys:
          - ${proprio_key:KITCHEN_ARM_ACTION}
        mse_weight: 0.0
        l1_weight: 1.0
        huber_weight: 0.0
      kl_divergence:
        weight: 0.01
        prior_regularization_weight: 0.0
      trajectory_length:
        weight: 0.0
        action_key: ${proprio_key:KITCHEN_ARM_ACTION}

  encoding_pipeline:
    encoders:
      left:
        input_keys:
          - ${cameras:AGENTVIEW}

  decoder:
    input_keys:
      - left_rgb
    latent_dimension: ${policy.algorithm.posterior_encoder.latent_dimension}
    embedding_dimension: 256
    number_of_heads: 8
    feedforward_dimension: 1024
    number_of_layers: 4
    dropout_rate: 0.1
    attention_dropout: 0.01
    activation: ${activation_function:RELU}

  algorithm:
    sampling_from_prior_probability: 0.0
    posterior_decoder_noise_std: 0.0
    posterior_encoder:
      latent_dimension: 16
      embedding_dimension: 256
      number_of_heads: 8
      feedforward_dimension: 1024
      number_of_encoder_layers: 4
      dropout_rate: 0.1
      attention_dropout: 0.01
      deterministic: false
      mu_tanh_bound: null
      device: ${policy.device}
      activation: ${activation_function:RELU}
    prior:
      latent_dimension: 16
      device: ${policy.device}
