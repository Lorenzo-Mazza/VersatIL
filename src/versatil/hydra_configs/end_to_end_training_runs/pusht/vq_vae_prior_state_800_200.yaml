# @package _global_
# Push-T state-only LACT VQ with learned categorical prior.
# Stage 1 trains the VQ tokenizer/decoder for 800 epochs; stage 2 trains the prior for 200.
_target_: versatil.configs.main.MainConfig

defaults:
  - /task: base
  - /policy: base
  - /experiment: default
  - /task/dataset_schema: pusht
  - /task/dataloader: pusht_state
  - /task/action_space: pusht_precomputed
  - /task/observation_space: pusht_state
  - /training: default
  - /policy/encoding_pipeline: pusht_state
  - /policy/decoder: lact
  - /policy/algorithm: bc_with_vq_learned
  - /policy/loss: regression_vq_ce
  - override /policy/decoder/heads@policy.decoder.action_heads: pusht_2d
  - _self_

task:
  observation_horizon: 1
  prediction_horizon: 10
  dataloader:
    val_ratio: 0.05
    preload_data_in_memory: true

experiment:
  checkpoint_folder: ${checkpoint_dir:pusht}
  checkpoint_every: 100
  use_wandb: true

training:
  num_epochs: 1000
  early_stopping_patience: null
  clip_gradient_norm: false
  lr_schedule: null
  use_ema: false
  optimizer:
    lr: 5.0e-4
    param_groups:
      - name: posterior
        lr: ${training.optimizer.lr}
        params_pattern: "^algorithm\\.posterior_encoder\\."
      - name: prior
        lr: ${training.optimizer.lr}
        params_pattern: "^algorithm\\.prior\\."
      - name: decoder
        lr: ${training.optimizer.lr}
        params_pattern: "^decoder\\."
  stages:
    - name: vq_tokenizer
      start_epoch: 0
      end_epoch: 800
      trainable_groups:
        - posterior
        - decoder
        - unmatched
      frozen_groups:
        - prior
      loss_weights:
        vq_prior_ce:
          weight: 0.0
      eval_frozen_modules: true
    - name: prior
      start_epoch: 800
      trainable_groups:
        - prior
      frozen_groups:
        - posterior
        - decoder
        - unmatched
      loss_weights:
        regression_loss:
          mse_weight: 0.0
          l1_weight: 0.0
          huber_weight: 0.0
        vq_commitment:
          weight: 0.0
        vq_prior_ce:
          weight: 1.0
      eval_frozen_modules: true

policy:
  _target_: versatil.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  observation_horizon: ${task.observation_horizon}
  device: ${experiment.device}

  loss:
    loss_modules:
      regression_loss:
        action_keys:
          - ${proprio_key:EE_POS_ACTION}
        mse_weight: 0.0
        l1_weight: 1.0
        huber_weight: 0.0
      vq_commitment:
        weight: 0.25
        num_codes: 8
        num_residual_layers: 2
      vq_prior_ce:
        weight: 1.0
      trajectory_length:
        weight: 0.0
        action_key: ${proprio_key:EE_POS_ACTION}

  decoder:
    input_keys:
      - robot_state_proprio
    embedding_dimension: 256
    number_of_heads: 8
    feedforward_dimension: 1024
    number_of_layers: 4
    dropout_rate: 0.1
    attention_dropout: 0.01
    activation: ${activation_function:RELU}

  algorithm:
    sampling_from_prior_probability: 0.0
    posterior_decoder_noise_std: 0.0
    posterior_encoder:
      latent_dimension: 4
      num_codes: 8
      num_residual_layers: 2
      embedding_dimension: 256
      number_of_heads: 8
      feedforward_dimension: 1024
      number_of_encoder_layers: 4
      dropout_rate: 0.1
      attention_dropout: 0.01
      device: ${policy.device}
      activation: ${activation_function:RELU}
    prior:
      latent_dimension: 4
      num_codes: 8
      num_residual_layers: 2
      embedding_dimension: 256
      number_of_heads: 8
      feedforward_dimension: 1024
      number_of_encoder_layers: 4
      dropout_rate: 0.1
      attention_dropout: 0.01
      device: ${policy.device}
      activation: ${activation_function:RELU}
