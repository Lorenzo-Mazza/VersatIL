name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CUDA_VISIBLE_DEVICES: ""
  HF_HOME: ~/.cache/huggingface
  TORCH_HOME: ~/.cache/torch

jobs:
  ruff-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.6"
          args: format --check src/ tests/

  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.15.6"
          args: check src/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    needs: [ruff-format, ruff-lint]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@v5
        with:
          cache-dependency-glob: pyproject.toml
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-models-
      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          VERSATIL_CACHE_DIR=/tmp/versatil/cache
          VERSATIL_CHECKPOINT_DIR=/tmp/versatil/checkpoints
          VERSATIL_ZARR_DIR=/tmp/versatil/zarr
          VERSATIL_PRETRAINED_DIR=/tmp/versatil/pretrained
          EOF
      - name: Install dependencies
        run: |
          uv venv .venv --python ${{ matrix.python-version }}
          source .venv/bin/activate
          uv sync --python ${{ matrix.python-version }} --extra cpu
      - name: Run unit tests with coverage
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -m "not integration and not slow and not requires_gpu and not requires_executorch" --cov=versatil --cov-fail-under=90 --cov-report=xml:coverage.xml --cov-report=term-missing --tb=short -q --junitxml=report-unit.xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report-${{ matrix.python-version }}
          path: coverage.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          disable_search: true
          flags: unit-py${{ matrix.python-version }}
          name: unit-tests-${{ matrix.python-version }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report-${{ matrix.python-version }}
          path: report-unit.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: [ruff-format, ruff-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v5
        with:
          cache-dependency-glob: pyproject.toml
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-models-
      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          VERSATIL_CACHE_DIR=/tmp/versatil/cache
          VERSATIL_CHECKPOINT_DIR=/tmp/versatil/checkpoints
          VERSATIL_ZARR_DIR=/tmp/versatil/zarr
          VERSATIL_PRETRAINED_DIR=/tmp/versatil/pretrained
          EOF
      - name: Install dependencies
        run: |
          uv venv .venv --python 3.14
          source .venv/bin/activate
          uv sync --python 3.14 --extra cpu
      - name: Run integration tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -m "integration and not slow and not requires_gpu and not requires_executorch" --tb=short -q --junitxml=report-integration.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: report-integration.xml

  executorch-tests:
    runs-on: ubuntu-latest
    needs: [ruff-format, ruff-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
        with:
          cache-dependency-glob: pyproject.toml
      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          VERSATIL_CACHE_DIR=/tmp/versatil/cache
          VERSATIL_CHECKPOINT_DIR=/tmp/versatil/checkpoints
          VERSATIL_ZARR_DIR=/tmp/versatil/zarr
          VERSATIL_PRETRAINED_DIR=/tmp/versatil/pretrained
          EOF
      - name: Install dependencies
        run: |
          uv venv .venv --python 3.13
          source .venv/bin/activate
          uv sync --python 3.13 --extra cpu --extra executorch
      - name: Run ExecuTorch tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -m "requires_executorch and not slow and not requires_gpu" --tb=short -q --junitxml=report-executorch.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executorch-test-report
          path: report-executorch.xml

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, executorch-tests]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v5
        with:
          cache-dependency-glob: pyproject.toml
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-models-
      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          VERSATIL_CACHE_DIR=/tmp/versatil/cache
          VERSATIL_CHECKPOINT_DIR=/tmp/versatil/checkpoints
          VERSATIL_ZARR_DIR=/tmp/versatil/zarr
          VERSATIL_PRETRAINED_DIR=/tmp/versatil/pretrained
          EOF
      - name: Install dependencies
        run: |
          uv venv .venv --python 3.14
          source .venv/bin/activate
          uv sync --python 3.14 --extra cpu
      - name: Clean dependency caches before e2e
        run: |
          uv cache clean || true
          rm -rf ~/.cache/torch
          df -h
      - name: Run e2e tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/endpoints/test_end_to_end.py -m "slow and not requires_executorch" --tb=short -q --junitxml=report-e2e.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: report-e2e.xml
