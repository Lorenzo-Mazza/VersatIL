name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CUDA_VISIBLE_DEVICES: ""
  HF_HOME: ~/.cache/huggingface
  TORCH_HOME: ~/.cache/torch

jobs:
  ruff-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.14.3"
          args: format --check src/ tests/

  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          version: "0.14.3"
          args: check src/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    needs: [ruff-format, ruff-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-models-
      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          VERSATIL_CACHE_DIR=/tmp/versatil/cache
          VERSATIL_CHECKPOINT_DIR=/tmp/versatil/checkpoints
          VERSATIL_ZARR_DIR=/tmp/versatil/zarr
          VERSATIL_PRETRAINED_DIR=/tmp/versatil/pretrained
          EOF
      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install --extra-index-url https://download.pytorch.org/whl/cpu torch==2.4.0 torchaudio==2.4.0 torchvision==0.19.0
          uv sync --no-install-package flash-attn
          uv pip install pytest-cov
      - name: Run unit tests with coverage
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -m "not integration and not slow and not requires_gpu" --cov=versatil --cov-report=xml:coverage.xml --cov-report=term-missing -q --junitxml=report-unit.xml
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: report-unit.xml

  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-models-
      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          VERSATIL_CACHE_DIR=/tmp/versatil/cache
          VERSATIL_CHECKPOINT_DIR=/tmp/versatil/checkpoints
          VERSATIL_ZARR_DIR=/tmp/versatil/zarr
          VERSATIL_PRETRAINED_DIR=/tmp/versatil/pretrained
          EOF
      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install --extra-index-url https://download.pytorch.org/whl/cpu torch==2.4.0 torchaudio==2.4.0 torchvision==0.19.0
          uv sync --no-install-package flash-attn
      - name: Run integration tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -m "integration" --tb=short -q --junitxml=report-integration.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-report
          path: report-integration.xml

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-models-
      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          VERSATIL_CACHE_DIR=/tmp/versatil/cache
          VERSATIL_CHECKPOINT_DIR=/tmp/versatil/checkpoints
          VERSATIL_ZARR_DIR=/tmp/versatil/zarr
          VERSATIL_PRETRAINED_DIR=/tmp/versatil/pretrained
          EOF
      - name: Install dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install --extra-index-url https://download.pytorch.org/whl/cpu torch==2.4.0 torchaudio==2.4.0 torchvision==0.19.0
          uv sync --no-install-package flash-attn
      - name: Run e2e tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/endpoints/test_end_to_end.py -m "slow" --tb=short -q --junitxml=report-e2e.xml
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: report-e2e.xml
