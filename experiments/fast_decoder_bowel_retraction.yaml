
defaults:
  - experiment: bowel_retraction_fast_decoder
  - task/dataset_schema: bowel_retraction_v2
  - task/dataloader: fast_decoder_default
  - task/action_space: br_position_gripper_deltas_cf
  - task/observation_space: br_rgb_only
  - training: act_default
  - policy/encoding_pipeline: rgb_resnet18
  - policy/decoder: fast_decoder_default
  - policy/algorithm: behavioral_cloning
  - policy/loss: fast_decoder_default
  - inference: act_default
  - _self_

task:
  observation_horizon: 1  # FAST Decoder uses single observation
  prediction_horizon: 10  # Max sequence length for autoregressive generation

policy:
  _target_: refactoring.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  device: ${experiment.device}
  validate_loss_keys: true

# Override specific parameters from defaults/command line if needed
# For example, to use different batch size:
# task.dataloader.batch_size: 64
