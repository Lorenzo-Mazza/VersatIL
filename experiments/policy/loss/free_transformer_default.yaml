# Free Transformer Loss Configuration
# Composite loss with L1 regression, BCE gripper, and Binary KL divergence

_target_: refactoring.metrics.CompositeLoss

loss_modules:
  position_regression:
    _target_: refactoring.metrics.RegressionLoss
    action_keys:
      - ${action_key:POSITION}
    mse_weight: 0.0
    l1_weight: 1.0
    huber_weight: 0.0

  gripper:
    _target_: refactoring.metrics.GripperLoss
    gripper_type: ${gripper:BINARY}
    bce_weight: 1.0
    mse_weight: 0.0

  # Binary KL divergence for discrete latent codes (Free Transformer)
  binary_kl:
    _target_: refactoring.metrics.BinaryKLDivergenceLoss
    weight: 100.0  # Weight is applied in loss module
    free_bits: 0.1  # Minimum KL per latent dimension

# Weights for each loss module (multiplied by module's internal weight)
weights:
  position_regression: 0.8
  gripper: 0.05
  binary_kl: 5.0  # High weight for discrete latent regularization
