
defaults:
  - token_loss@loss_modules.token_loss
  - _self_

_target_: refactoring.metrics.CompositeLoss
loss_modules:
    token_loss:
      _target_: refactoring.metrics.components.ActionTokenLoss
      label_smoothing: 0.1

    binary_kl:
      _target_: refactoring.metrics.BinaryKLDivergenceLoss
      free_bits: 1.3862943611198906  # 2 * math.log(2) ≈1.386 nats

# Weights for each loss module (multiplied by module's internal weight)
weights:
  token_loss: 1.0
  binary_kl: 5.0  # High weight for discrete latent regularization
