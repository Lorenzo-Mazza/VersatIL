# Phase ACT Loss Configuration
# Adds phase classification loss on top of action reconstruction

_target_: refactoring.metrics.PhaseActionLoss

action_keys: null

# Action reconstruction weights (from phase_act.json)
mse_weight: 0.0
l1_weight: 0.8  # Phase ACT uses L1 instead of MSE
gripper_bce_weight: 0.05
kl_weight: 100.0  # VAE KL divergence
length_weight: 0.001  # sinkhorn_weight in old config
smoothness_weight: 0.0

# Phase classification weights
phase_ce_weight: 0.1  # Cross-entropy for phase prediction
phase_entropy_weight: 0.01  # Entropy regularization
label_smoothing: 0.0

gripper_type: ${gripper:BINARY}
use_vae: true
