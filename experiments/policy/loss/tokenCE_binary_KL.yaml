defaults:
  - token_loss@loss_modules.token_loss
  - binary_kl@loss_modules.binary_kl
  - _self_

_target_: refactoring.metrics.CompositeLoss
loss_modules:
    token_loss:
      label_smoothing: 0.1

    binary_kl:
      free_bits: 1.3  # 2 * math.log(2) ≈1.386 nats
      latent_bits: ${policy.decoder.latent_bits}
      entropy_weight: 0.0001

weights:
  token_loss: 1.0
  binary_kl: 5.0
