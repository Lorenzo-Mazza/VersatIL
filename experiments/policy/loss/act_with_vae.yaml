# ACT Loss with VAE KL divergence
# Uses KL weight of 100 as in ACT paper

_target_: refactoring.metrics.ActionReconstructionLoss

action_keys: null

# Loss weights
mse_weight: 0.8
l1_weight: 0.0
gripper_bce_weight: 0.05
kl_weight: 100.0  # Standard ACT paper value
length_weight: 0.001
smoothness_weight: 0.0

gripper_type: binary
use_vae: true
