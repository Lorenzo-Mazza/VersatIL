defaults:
  - regression@loss_modules.regression_loss
  - gripper@loss_modules.gripper_loss
  - kl@loss_modules.kl_divergence
  - traj_len@loss_modules.trajectory_length
  - _self_
_target_: refactoring.metrics.CompositeLoss
loss_modules:
    regression_loss:
      _target_: refactoring.metrics.RegressionLoss
      action_keys:
        - ${action_key:POSITION}
      mse_weight: 0.0
      l1_weight: 1.0
      huber_weight: 0.0

    gripper_loss:
      _target_: refactoring.metrics.GripperLoss
      gripper_type: ${gripper:BINARY}
      bce_weight: 0.05

    kl_divergence:
        _target_: refactoring.metrics.KLDivergenceLoss
        weight: 100.0

    trajectory_length:
        _target_: refactoring.metrics.TrajectoryLengthLoss
        weight: 0.001
