defaults:
  - regression@loss_modules.regression_loss
  - mmd@loss_modules.maximum_mean_discrepancy
  - _self_

_target_: refactoring.metrics.CompositeLoss
loss_modules:
    regression_loss:
      _target_: refactoring.metrics.RegressionLoss
      action_keys:
        - ${action_key:POSITION}
        - ${action_key:ORIENTATION}
        - ${action_key:GRIPPER}
      mse_weight: 0.0
      l1_weight: 1.0
      huber_weight: 0.0

    maximum_mean_discrepancy:
            weight: 50.0

    trajectory_length:
        _target_: refactoring.metrics.TrajectoryLengthLoss
        weight: 0.0
