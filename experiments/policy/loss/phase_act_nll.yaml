# The syntax to validate against structured configs is always: `config_name in the configs.init.py`@`field path in the yaml file to validate`
defaults:
  - fv_gaussian_nll@loss_modules.moe_loss.base_loss.loss_modules.action_nll
  - fv_bernoulli_nll@loss_modules.moe_loss.base_loss.loss_modules.gripper_nll
  - traj_len@loss_modules.moe_loss.base_loss.loss_modules.trajectory_length
  - phase_classification@loss_modules.moe_loss.base_loss.loss_modules.phase_classification_loss
  - kl@loss_modules.moe_loss.base_loss.loss_modules.kl_divergence
  - _self_

_target_: refactoring.metrics.CompositeLoss
loss_modules:
  moe_loss:
    _target_: refactoring.metrics.MoELoss
    base_loss:
      _target_: refactoring.metrics.CompositeLoss
      loss_modules:
        action_nll:
          action_keys:
            - ${action_key:POSITION}
          weight: 1.0

        gripper_nll:
          gripper_type: ${task.action_space.gripper_type}
          weight: 0.05

        maximum_mean_discrepancy:
            weight: 50.0

        kl_divergence:
            _target_: refactoring.metrics.KLDivergenceLoss
            weight: 100.0

        trajectory_length:
            _target_: refactoring.metrics.TrajectoryLengthLoss
            weight: 0.0
            action_key: ${action_key:POSITION}

        phase_classification_loss:
          cross_entropy_weight: 0.1
          entropy_weight: 0.01
          label_smoothing: 0.0



