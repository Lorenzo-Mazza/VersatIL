defaults:
  - token_loss@loss_modules.token_loss
  - binary_mmd@loss_modules.maximum_mean_discrepancy
  - _self_

_target_: refactoring.metrics.CompositeLoss
loss_modules:
    token_loss:
      _target_: refactoring.metrics.components.ActionTokenLoss
      label_smoothing: 0.1

    maximum_mean_discrepancy:
      weight: 50.0

