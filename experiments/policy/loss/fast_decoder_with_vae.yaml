# FAST Decoder + VAE Loss Configuration
# Combines action token cross-entropy with continuous Gaussian KL divergence

_target_: refactoring.metrics.composite.CompositeLoss

loss_modules:
  # Action reconstruction loss (cross-entropy over tokens)
  action_token:
    _target_: refactoring.metrics.components.ActionTokenLoss
    ignore_index: 0  # Ignore padding tokens
    label_smoothing: 0.0

  # VAE regularization (continuous Gaussian KL divergence)
  kl_divergence:
    _target_: refactoring.metrics.components.KLDivergenceLoss
    weight: 10.0  # KL weight (ACT paper uses 100, tune for FAST)

# Weights for each loss module (optional, defaults to 1.0 each)
weights:
  action_token: 1.0
  kl_divergence: 1.0