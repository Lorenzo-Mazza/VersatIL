defaults:
  - regression@loss_modules.regression_loss
  - gripper@loss_modules.gripper_loss
  - kl@loss_modules.kl_divergence
  - entropy@loss_modules.entropy
  - traj_len@loss_modules.trajectory_length
  - _self_
_target_: refactoring.metrics.CompositeLoss
loss_modules:
    regression_loss:
      action_keys:
        - ${proprio_key:CAMERA_FRAME_CARTESIAN_TIP_POS}
      mse_weight: 0.0
      l1_weight: 1.0
      huber_weight: 0.0

    entropy:
        weight: 0.001
        key: ${latent_key:PRIOR_LOGVAR}

    gripper_loss:
      key: ${proprio_key:GRIPPER_STATE}
      actions_metadata: ${task.action_space.actions_metadata}
      bce_weight: 0.05

    kl_divergence:
        weight: 100.0

    trajectory_length:
        weight: 0.001
        action_key: ${proprio_key:CAMERA_FRAME_CARTESIAN_TIP_POS}
