# Encoding pipeline for RGB-only observations using ResNet18
# Standard configuration for ACT models

encoders:
  left_rgb:
    _target_: refactoring.models.encoding.encoders.rgb.cnn.CNNEncoder
    input_keys: left_image
    backbone: timm/resnet18.a1_in1k
    pretrained: false
    frozen: false
    pooling_method: none
    use_group_norm: true

  right_rgb:
    _target_: refactoring.models.encoding.encoders.rgb.cnn.CNNEncoder
    input_keys: right_image
    backbone: timm/resnet18.a1_in1k
    pretrained: false
    frozen: false
    pooling_method: none
    use_group_norm: true

# Fusion: concatenate left and right features
fusion_stages:
  - _target_: refactoring.models.encoding.fusion.spatial.SpatialFusion
    input_features:
      - left_rgb_features
      - right_rgb_features
    output_name: visual_features
    hidden_dim: 256  # Project each encoder to 256 channels before fusion