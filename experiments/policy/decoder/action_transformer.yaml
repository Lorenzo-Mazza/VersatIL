defaults:
  - simple_action_transformer

input_keys:
  - left_rgb
  - right_rgb
embedding_dimension: 512
number_of_heads: 8
number_of_key_value_heads: 2
feedforward_dimension: 3200
number_of_layers: 8
activation: ${activation_function:SWIGLU}
normalization_type: ${normalization:RMS_NORM}
attention_type: ${attention:GROUPED_QUERY}
dropout_rate: 0.1
attention_dropout: 0.05
positional_encoding_type: ${pos_encoding:ROPE}

action_heads:
  position_action:
    _target_: refactoring.models.decoding.action_heads.ActionHead
    input_dim: ${policy.decoder.embedding_dimension}
    output_dim: ${task.action_space.position_dim}
    blocks:
      - _target_: refactoring.models.decoding.action_heads.blocks.MLPBlock
        input_dim: ${policy.decoder.embedding_dimension}
        hidden_dims:
          - 256  # embedding_dimension // 2
          - 128  # embedding_dimension // 4
        output_dim: null
        activation: ${activation_function:SILU}
        dropout: ${policy.decoder.dropout_rate}
  gripper_action:
    _target_: refactoring.models.decoding.action_heads.ActionHead
    input_dim: ${policy.decoder.embedding_dimension}
    output_dim: ${task.action_space.gripper_dim}
    blocks:
      - _target_: refactoring.models.decoding.action_heads.blocks.MLPBlock
        input_dim: ${policy.decoder.embedding_dimension}
        hidden_dims:
          - 128  # embedding_dimension // 4
        output_dim: null  # Outputs 128, then ActionHead projects 128 -> gripper_dim
        activation: ${activation_function:SILU}
        dropout: ${policy.decoder.dropout_rate}

observation_horizon: ${task.observation_horizon}
prediction_horizon: ${task.prediction_horizon}
action_space: ${task.action_space}
observation_space: ${task.observation_space}
device: ${experiment.device}