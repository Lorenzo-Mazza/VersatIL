defaults:
  - diffusion_act
  - heads@action_heads: unet_bowel_retraction

# Key is always "{encoder_name}_{EncoderOutputType.value}" for each encoder in the encoding pipeline
input_keys:
  - left_rgb
  - right_rgb
  - camera_frame_proprio

diffusion_transformer_type: ${dit_type:CROSS_ATTENTION}
max_sequence_length: 1024
embedding_dimension: 512
timestep_embedding_dimension: 256
number_of_heads: 8
number_of_key_value_heads: null
number_of_layers: 6
feedforward_dimension: 2048
activation: ${activation_function:SILU}
normalization_type: ${normalization:LAYER_NORM}
attention_type: ${attention:MULTI_HEAD}
dropout_rate: 0.1
attention_dropout: 0.0
positional_encoding_type: ${pos_encoding:SINUSOIDAL}
use_gating: true

observation_horizon: ${task.observation_horizon}
prediction_horizon: ${task.prediction_horizon}
action_space: ${task.action_space}
observation_space: ${task.observation_space}
device: ${experiment.device}