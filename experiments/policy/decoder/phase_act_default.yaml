defaults:
  - phase_act

_target_: refactoring.models.decoding.decoders.factory.phase_act.PhaseACT

# Key is always "{encoder_name}_{EncoderOutputType.value}" for each encoder in the encoding pipeline
input_keys:
  - left_rgb
  - right_rgb

embedding_dimension: 512
number_of_heads: 8
feedforward_dimension: 3200
number_of_encoder_layers: 4
number_of_decoder_layers: 7

activation: ${activation_function:RELU}
dropout_rate: 0.1
normalize_before: false

phase_routing_key: phase_label

# Action heads with MoE for phase-conditioned predictions
action_heads:
  phase_label:
    _target_: refactoring.models.decoding.action_heads.ActionHead
    input_dim: ${policy.decoder.embedding_dimension}
    output_dim: ${task.action_space.number_of_phases}
    blocks: null

  position_action:
    _target_: refactoring.models.decoding.action_heads.MoEHead
    output_dim: ${task.action_space.position_dim}
    device: ${experiment.device}
    num_experts: ${task.action_space.number_of_phases}
    base_expert:
      _target_: refactoring.models.decoding.action_heads.ActionHead
      input_dim: ${policy.decoder.embedding_dimension}
      output_dim: ${task.action_space.position_dim}
      blocks: null
    temperature: 100.0
    learnable_temperature: true
    routing_type: soft

  gripper_action:
    _target_: refactoring.models.decoding.action_heads.MoEHead
    output_dim: ${task.action_space.gripper_dim}
    device: ${experiment.device}
    num_experts: ${task.action_space.number_of_phases}
    base_expert:
      _target_: refactoring.models.decoding.action_heads.ActionHead
      input_dim: ${policy.decoder.embedding_dimension}
      output_dim: ${task.action_space.gripper_dim}
      blocks: null
    temperature: 100.0
    learnable_temperature: true
    routing_type: soft

observation_horizon: ${task.observation_horizon}
prediction_horizon: ${task.prediction_horizon}
action_space: ${task.action_space}
observation_space: ${task.observation_space}
device: ${experiment.device}