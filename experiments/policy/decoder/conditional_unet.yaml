# Conditional U-Net Decoder
defaults:
  - heads@action_heads: unet_bowel_retraction

_target_: versatil.models.decoding.decoders.factory.conditional_unet_decoder.ConditionalUNetDecoder

# Key is always "{encoder_name}_{EncoderOutputType.value}" for each encoder in the encoding pipeline
input_keys:
  - left_rgb
  - right_rgb
  - camera_frame_proprio

# Diffusion timestep embedding dimension
embedding_dimension: 256

# U-Net downsampling channel dimensions
down_dimensions:
  - 256
  - 512
  - 1024

# Convolution kernel size in residual blocks
kernel_size: 5

# Number of groups for group normalization
num_groups: 8

# Local conditioning (sequence-aligned features)
# Currently not implemented - use global conditioning only
use_local_conditioning: false

# Whether conditions predict scaling factors in FiLM
condition_predict_scale: true

observation_horizon: ${task.observation_horizon}
prediction_horizon: ${task.prediction_horizon}
action_space: ${task.action_space}
observation_space: ${task.observation_space}
device: ${experiment.device}