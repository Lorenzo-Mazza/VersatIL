# ACT Decoder Configuration
# Action Chunking Transformer with DETR-style encoder-decoder

_target_: refactoring.models.decoding.decoders.factory.act.ACT

# Input features from encoding pipeline
input_keys:
  - visual_features

# Transformer architecture
embedding_dimension: 512
number_of_heads: 8
feedforward_dimension: 3200
number_of_encoder_layers: 4
number_of_decoder_layers: 7

# Architecture details
activation: relu
dropout_rate: 0.1
normalize_before: false

# Action heads (dynamically created from action_space)
action_heads: {}  # Auto-populated based on action_space

# References to task/policy configs (Hydra interpolation)
observation_horizon: ${task.observation_horizon}
prediction_horizon: ${task.prediction_horizon}
action_space: ${task.action_space}
observation_space: ${task.observation_space}
device: ${experiment.device}