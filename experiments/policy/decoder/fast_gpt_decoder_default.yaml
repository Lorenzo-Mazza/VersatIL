# Pure GPT-style autoregressive transformer for tokenized action prediction
defaults:
  - gpt


_target_: refactoring.models.decoding.decoders.factory.fast_gpt_decoder.FASTGPTDecoder

# Key is always "{encoder_name}_{EncoderOutputType.value}" for each encoder in the encoding pipeline
input_keys:
  - left_image
  - right_image
  - embedder_token_embedding

max_seq_len: 512  # Maximum sequence length (features + action tokens)

embedding_dimension: 512
number_of_heads: 8
number_of_key_value_heads: 2
feedforward_dimension: 1024
number_of_layers: 4
activation: ${activation_function:SWIGLU}
normalization_type: ${normalization:RMS_NORM}
attention_type: ${attention:GROUPED_QUERY}
dropout_rate: 0.2
attention_dropout: 0.1
positional_encoding_type: ${pos_encoding:ROPE}
temperature: 10.0
learnable_temperature: true
deterministic: true
action_heads:
  action_logits:
    _target_: refactoring.models.decoding.action_heads.ActionHead
    input_dim: ${policy.decoder.embedding_dimension}
    output_dim: 1 # Will be overriden at runtime based on vocabulary size

observation_horizon: ${task.observation_horizon}
prediction_horizon: ${task.prediction_horizon}
action_space: ${task.action_space}
observation_space: ${task.observation_space}
device: ${experiment.device}