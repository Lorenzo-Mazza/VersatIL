# Encoding pipeline for RGB + Depth with geometric attention fusion
# Uses DFormerV2 for depth-aware encoding

_target_: versatil.models.encoding.pipeline.EncodingPipeline

encoders:
  left_depth:
    _target_: versatil.models.encoding.encoders.depth.light_geometric.LightGeometricEncoder
    input_keys:
      - ${cameras:LEFT}
      - ${cameras:DEPTH}
    embedding_dimension: 512
    patch_size: 32
    pooling_method: none

  right:
    _target_: versatil.models.encoding.encoders.rgb.cnn.CNNEncoder
    input_keys:
     - ${cameras:RIGHT}
    backbone: ${rgb_backbone:RESNET18}
    pretrained: true
    frozen: false
    pooling_method: none
    batch_norm_handling: ${batch_norm_handling:FROZEN}

