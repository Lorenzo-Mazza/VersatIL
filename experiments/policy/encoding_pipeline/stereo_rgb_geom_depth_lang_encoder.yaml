defaults:
  - encoder/image/cnn@encoders.left
  - encoder/image/cnn@encoders.right
  - encoder/language@encoders.instruction
  - _self_

_target_: refactoring.models.encoding.pipeline.EncodingPipeline

encoders:
  left_depth:
    _target_: refactoring.models.encoding.encoders.depth.light_geometric.LightGeometricEncoder
    input_keys:
      - ${cameras:LEFT}
      - ${cameras:DEPTH}
    embedding_dimension: 512
    patch_size: 32
    pooling_method: none

  right:
    _target_: refactoring.models.encoding.encoders.rgb.cnn.CNNEncoder
    input_keys:
     - ${cameras:RIGHT}
    backbone: ${rgb_backbone:RESNET18}
    pretrained: false
    frozen: false
    pooling_method: none
    use_group_norm: true


  instruction:
    model_name: ${language_model:GEMMA_2B}
    pretrained: true
    frozen: true
    max_token_len: ${task.dataloader.tokenization.observation_tokenizer.max_token_len}

fusion_stages: []