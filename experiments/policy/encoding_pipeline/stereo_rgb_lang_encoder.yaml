defaults:
  - encoder/image/cnn@encoders.left
  - encoder/image/cnn@encoders.right
  - encoder/language@encoders.instruction
  - _self_

_target_: refactoring.models.encoding.pipeline.EncodingPipeline

encoders:
  left:
    _target_: refactoring.models.encoding.encoders.rgb.cnn.CNNEncoder
    input_keys:
    - ${cameras:LEFT}
    backbone: ${rgb_backbone:EFFICIENTNET_B0}
    pretrained: false
    frozen: false
    pooling_method: none
    use_group_norm: true

  right:
    _target_: refactoring.models.encoding.encoders.rgb.cnn.CNNEncoder
    input_keys:
    - ${cameras:RIGHT}
    backbone: ${rgb_backbone:EFFICIENTNET_B0}
    pretrained: false
    frozen: false
    pooling_method: none
    use_group_norm: true

  instruction:
    model_name: ${language_model:GEMMA_2B}
    pretrained: true
    frozen: true
    max_token_len: ${task.dataloader.tokenization.observation_tokenizer.max_token_len}

fusion_stages: []