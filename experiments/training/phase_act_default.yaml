defaults:
  - base

num_epochs: 100
gradient_accumulate_every: 1

optimizer:
  target_class : "torch.optim.AdamW"
  lr: 5.0e-5
  weight_decay: 0.1
  betas: [0.9, 0.999]
  eps: 1.0e-8
  param_groups:
    - name: backbone
      lr: 1.0e-5
      weight_decay: 1.0e-3
      params_pattern: "encoding_pipeline.encoders.*.backbone"

clip_gradient_norm: true
clip_max_norm: 1.0

lr_schedule: null
use_ema: false

# Stochastic Weight Averaging (SWA)
swa_lrs: null
tune_lr: false  # Automatically find optimal learning rate

early_stopping_patience: 20