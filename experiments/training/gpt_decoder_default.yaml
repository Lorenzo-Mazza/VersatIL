num_epochs: 500
gradient_accumulate_every: 1

optimizer:
  _target_: torch.optim.AdamW
  lr: 5.0e-5
  weight_decay: 1.0e-3
  betas: [0.9, 0.999]
  eps: 1.0e-8
  param_groups:
    - name: backbone
      lr: 1.0e-5
      weight_decay: 1.0e-5
      params_pattern: "encoding_pipeline.encoders.*.backbone"

clip_gradient_norm: true
clip_max_norm: 1.0

lr_schedule: cosine
lr_warmup_steps: 500

use_ema: true
ema_power: 0.999

# Stochastic Weight Averaging (SWA)
swa_lrs: 1e-4  # Set to a float to enable SWA
swa_epoch_start: 0.8  # Start SWA at 80% of training
swa_annealing_epochs: 10  # Anneal LR over 10 epochs

tune_lr: true  # Automatically find optimal learning rate
tune_batch_size: true  # Automatically find largest fitting batch size

early_stopping_patience: 50