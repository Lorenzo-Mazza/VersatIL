num_epochs: 500
gradient_accumulate_every: 1

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  weight_decay: 1.0e-5
  betas: [0.9, 0.999]
  eps: 1.0e-8
  param_groups:
    - name: backbone
      lr: 1.0e-5
      weight_decay: 1.0e-6
      params_pattern: "encoding_pipeline.encoders.*.backbone"

clip_gradient_norm: true
clip_max_norm: 1.0

lr_schedule: cosine
lr_warmup_steps: 500

use_ema: false
