_target_: refactoring.configs.main.MainConfig

defaults:
  - task: base
  - policy: base
  - experiment: bowel_retraction_phase_act
  - task/dataset_schema: bowel_retraction_v2
  - task/dataloader: phase_act_default
  - task/action_space: deltas_cf_pos_gripper_phase
  - task/observation_space: stereo_rgbd
  - training: phase_act_default
  - policy/encoding_pipeline: stereo_rgb_light_geom_depth
  - policy/decoder: phase_act_default
  - policy/algorithm: bc_with_vae_gaussian
  - policy/loss: phase_act_default
  - inference: act_default
  - _self_

task:
  observation_horizon: 1  # Phase ACT does not use history
  prediction_horizon: 10

policy:
  _target_: refactoring.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  device: ${experiment.device}
  validate_loss_keys: true

