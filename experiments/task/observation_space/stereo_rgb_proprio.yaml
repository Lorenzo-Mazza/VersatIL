defaults:
  - base

_target_: refactoring.data.task.ObservationSpace

observations_metadata:
  ${proprio_key:ROBOT_FRAME_CARTESIAN_TIP_POS}:
    _target_: refactoring.data.metadata.PositionObservationMetadata
    raw_data_column_keys: [relative_tip_position_x, relative_tip_position_y, relative_tip_position_z]
    dtype: float32
    dimension: 3
    needs_normalization: true
    frame: ${coordinate_system:ROBOT_BASE}

  ${proprio_key:CAMERA_FRAME_CARTESIAN_TIP_POS}:
    _target_: refactoring.data.metadata.PositionObservationMetadata
    raw_data_column_keys: [camera_frame_tip_position_x, camera_frame_tip_position_y, camera_frame_tip_position_z]
    dtype: float32
    dimension: 3
    needs_normalization: true
    frame: ${coordinate_system:CAMERA}

  ${cameras:LEFT}:
    _target_: refactoring.data.metadata.CameraMetadata
    camera_key: ${cameras:LEFT}
    dtype: uint8
    channels: 3
    image_width: 480
    image_height: 270

  ${cameras:RIGHT}:
    _target_: refactoring.data.metadata.CameraMetadata
    camera_key: ${cameras:RIGHT}
    dtype: uint8
    channels: 3
    image_width: 480
    image_height: 270