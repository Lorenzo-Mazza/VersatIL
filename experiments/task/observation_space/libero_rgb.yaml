defaults:
  - base

_target_: refactoring.data.task.ObservationSpace

observations_metadata:
  ${cameras:AGENTVIEW}:
    _target_: refactoring.data.metadata.CameraMetadata
    camera_key: ${cameras:AGENTVIEW}
    dtype: uint8
    channels: 3
    image_width: 128
    image_height: 128

  ${cameras:EYE_IN_HAND}:
    _target_: refactoring.data.metadata.CameraMetadata
    camera_key: ${cameras:EYE_IN_HAND}
    dtype: uint8
    channels: 3
    image_width: 128
    image_height: 128

  ${obs_key:LANGUAGE}:
    _target_: refactoring.data.metadata.ObservationMetadata
    raw_data_column_keys: [language]
    dtype: str
    dimension: 1
    is_numerical: false
    needs_normalization: false