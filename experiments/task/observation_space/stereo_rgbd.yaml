defaults:
  - base

_target_: refactoring.data.task.ObservationSpace

observations_metadata:
  ${cameras:LEFT}:
    _target_: refactoring.data.metadata.CameraMetadata
    camera_key: ${cameras:LEFT}
    dtype: uint8
    channels: 3
    image_width: 480
    image_height: 270

  ${cameras:RIGHT}:
    _target_: refactoring.data.metadata.CameraMetadata
    camera_key: ${cameras:RIGHT}
    dtype: uint8
    channels: 3
    image_width: 480
    image_height: 270

  ${cameras:DEPTH}:
    _target_: refactoring.data.metadata.CameraMetadata
    camera_key: ${cameras:DEPTH}
    dtype: float32
    channels: 1
    image_width: 480
    image_height: 270