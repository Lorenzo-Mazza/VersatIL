# Observation space for bowel retraction with RGB + Depth

# Proprioceptive observations (robot/camera frame)
use_proprioceptive_data: false
use_proprio_base_frame: false
use_proprio_camera_frame: false

# Gripper state
use_gripper_state: false
gripper_type: binary

# Camera observations (RGB + Depth)
camera_keys: # Cameras.enum
  - left
  - right
  - depth

# Language instructions
use_language: false

# Custom observation keys
custom_obs_keys: []