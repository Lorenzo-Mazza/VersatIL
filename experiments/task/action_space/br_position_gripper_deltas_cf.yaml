# Action space for bowel retraction task
# Predicts position deltas (3D) + gripper (binary) in camera frame

has_position: true
position_dim: 3

has_orientation: false
orientation_dim: 0

has_gripper: true
gripper_type: ${gripper:BINARY}  # binary or continuous
gripper_dim: 1
use_gripper_class_weights: false

# Predict actions in camera frame (not robot base frame)
predict_in_camera_frame: true

# Use deltas (incremental movements) instead of absolute positions
deltas_as_actions: true

# Whether to denoise actions for smoother trajectories
denoise_actions: true

task_has_phases: false

# Custom action dimensions (empty for standard tasks)
custom_action_dims: {}