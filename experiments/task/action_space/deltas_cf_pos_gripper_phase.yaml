defaults:
  - base

_target_: "refactoring.data.task.ActionSpace"

has_position: true
position_dim: 3
has_orientation: false
has_gripper: true
gripper_type: ${gripper:BINARY}
gripper_dim: 1
use_gripper_class_weights: false
predict_in_camera_frame: true

# Use deltas (incremental movements) instead of absolute positions
deltas_as_actions: true
denoise_actions: true
denoising_percentile: 35

task_has_phases: true
number_of_phases: 5
