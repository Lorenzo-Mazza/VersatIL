_target_: albumentations.Compose
transforms:
  - _target_: albumentations.GaussianBlur
    blur_limit: [3, 9]
    p: 0.6
  - _target_: albumentations.CoarseDropout
    max_holes: 12
    max_height: 12
    max_width: 12
    p: 0.5
  - _target_: albumentations.ShiftScaleRotate
    rotate_limit: [0, 0]
    scale_limit: [-0.6, 0.8]
    shift_limit: [-0.1, 0.1]
    p: 0.6