defaults:
  - base

tokenize_observations: true
tokenize_actions: true
observation_tokenizer:
  tokenizer_model: ${language_model:GEMMA_2B}
  observation_keys:
    - ${obs_key:PROPRIO_CAMERA_FRAME}
    - ${obs_key:PROPRIO_ROBOT_FRAME}
  max_token_len: 32
action_tokenizer:
  tokenizer_chain:
    - ${tokenizer_type:FAST}
  use_pretrained_fast: false
  max_token_len: 256

