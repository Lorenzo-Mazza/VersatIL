defaults:
  - base
  - image_augmentations@color_augmentation: color

batch_size: 64
num_workers: 16
shuffle: true

# Image dimensions
image_height: 270
image_width: 480

# Normalization
image_norm_type: ${image_norm_type:IMAGENET}
depth_norm_type:  ${image_norm_type:IMAGENET}
kinematics_norm_type: ${kinematics_norm_type:GAUSSIAN}
winsorize_depth: true
depth_winsorize_quantiles: [0.01, 0.99]
winsorize_kinematics: true
kinematics_winsorize_quantiles: [0.01, 0.99]

spatial_augmentation: null
rotation_augmentation: null

# Sampling strategy, random chunk samples one random chunk per episode, overlapping uses sliding window over the whole dataset.
sampling_mode: overlapping  # random_chunk, overlapping

# Episode preprocessing
skip_initial_episode_steps: 0
downsample_factor: 1
center_episode_start: false

# Action shifting (ACT latency compensation)
action_backward_shift: 0

# Train/val split
val_ratio: 0.1
total_ratio: 1.0