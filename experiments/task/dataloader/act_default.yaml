
batch_size: 128
num_workers: 16
shuffle: true

# Image dimensions
image_height: 270
image_width: 480

# Normalization
image_norm_type: zero_to_one  # zero_to_one, minus_one_to_one, imagenet
depth_norm_type: zero_to_one
kinematics_norm_type: gaussian  # gaussian, min_max, zero_to_one
winsorize_depth: true

# Augmentations (detailed configs in separate files)
color_augmentation:
  _target_: refactoring.configs.task.augmentations.ColorAugmentationPipeline
spatial_augmentation: null
rotation_augmentation: null

# Sampling strategy, random chunk samples one random chunk per episode, overlapping uses sliding window over the whole dataset.
sampling_mode: overlapping  # random_chunk, overlapping

skip_initial_episode_steps: 5
downsample_factor: 1
center_episode_start: false

# Action shifting (ACT latency compensation)
action_backward_shift: 1

# Train/val split
val_ratio: 0.1
total_ratio: 1.0