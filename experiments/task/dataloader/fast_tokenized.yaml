defaults:
  - base
  - image_augmentations@color_augmentation: color
  - image_augmentations@spatial_augmentation: spatial
  - tokenization@tokenization: obs_proprio_action_fast

batch_size: 128
num_workers: 16
shuffle: true
image_height: 270
image_width: 480

image_norm_type: zero_to_one
depth_norm_type: zero_to_one
kinematics_norm_type: min_max
winsorize_depth: true
depth_winsorize_quantiles: [0.01, 0.99]
winsorize_kinematics: true
kinematics_winsorize_quantiles: [0.01, 0.99]

sampling_mode: overlapping

skip_initial_episode_steps: 5
downsample_factor: 1
center_episode_start: false
action_backward_shift: 1

val_ratio: 0.1
total_ratio: 1.0
