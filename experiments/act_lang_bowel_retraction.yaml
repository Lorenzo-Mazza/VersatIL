_target_: refactoring.configs.main.MainConfig

defaults:
  - task: base
  - policy: base
  - experiment: bowel_retraction_act
  - task/dataset_schema: bowel_retraction_v4
  - task/dataloader: act_lang_default
  - task/action_space: deltas_cf_pos_gripper_phase
  - task/observation_space: stereo_rgb_language_proprio_cf
  - training: act_default
  - policy/encoding_pipeline: stereo_rgb_lang_encoder
  - policy/decoder: act_lang
  - policy/algorithm: bc_with_learned_prior
  - policy/loss: regression_gripper_MMD
  - inference: act_default
  - _self_

task:
  observation_horizon: 1
  prediction_horizon: 10
  action_space:
    actions_metadata:
      ${obs_key:PHASE_LABEL}:
        requires_prediction_head: false

policy:
  _target_: refactoring.models.policy.Policy
  observation_space: ${task.observation_space}
  action_space: ${task.action_space}
  prediction_horizon: ${task.prediction_horizon}
  observation_horizon: ${task.observation_horizon}
  device: ${experiment.device}
  validate_loss_keys: true
  loss:
    loss_modules:
      phase_passthrough:
        _target_: refactoring.metrics.MetadataPassthrough
        keys_mapping:
          ${obs_key:PHASE_LABEL}: ${metadata_key:PHASE_LABEL}

# Override specific parameters from defaults/command line if needed
# For example, to use different batch size:
# task.dataloader.batch_size: 64
# To override specific config components from command line, you can do for example
# ```policy/loss=mmd_l1_pos_gripper_bce``` to use MMD instead of KL in your loss
