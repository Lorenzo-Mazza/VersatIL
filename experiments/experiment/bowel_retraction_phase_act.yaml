# Experiment configuration for Phase ACT on bowel retraction

name: ${now:%Y%m%d_%H%M%S}_phaseact_br_cf_overlapping_data
seed: 42

# Checkpoint and logging
checkpoint_folder: /mnt/cluster/workspaces/mazzalore/bowel_retraction/
resume_from: null

# Weights & Biases
use_wandb: true
wandb_project: needle-threading-il
wandb_entity: null

# Device
device: cuda
distributed: false

# Training precision and performance
precision: ${precision:FP16_MIXED}  # PyTorch Lightning precision (FP32, FP16_MIXED, BF16_MIXED, etc.)
float32_matmul_precision: ${float32_matmul:MEDIUM}  # Tensor Cores for float32 (HIGHEST, HIGH, MEDIUM, or null)

# Checkpointing and validation
checkpoint_every: 20
val_every: 1
plot_every: 200
